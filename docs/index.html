<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berkeley RSF Weight Room Capacity Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #FDB927;
      --blue: #003262;
      --bg: #111;
      --card: #1e1e1e;
      --border: #333;
      --text: #e0e0e0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Status Banner ── */
    .banner {
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 600;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .banner.open  { background: #1a3a1a; border: 1px solid #2d6a2d; color: #6fcf6f; }
    .banner.closed { background: #3a1a1a; border: 1px solid #6a2d2d; color: #cf6f6f; }

    /* ── Header ── */
    h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }

    /* ── Sections ── */
    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    section { margin-bottom: 48px; }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 13px; color: var(--muted); }

    input[type="date"],
    select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    input[type="date"]:focus,
    select:focus { border-color: var(--gold); }

    .field-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 8px;
    }
    .field-checkbox label { font-size: 14px; color: var(--text); cursor: pointer; }
    input[type="checkbox"] { accent-color: var(--gold); width: 15px; height: 15px; cursor: pointer; }

    /* ── Prediction Metrics ── */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
    }
    .metric-card .label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .metric-card .value {
      font-size: 36px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.1;
    }
    .metric-card .sublabel { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Caption ── */
    .caption {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* ── Charts ── */
    .chart-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 8px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
  </style>
</head>
<body>
<div class="container">

  <div id="status-banner" class="banner">Checking RSF hours...</div>

  <h1>Berkeley RSF Weight Room Capacity Tracker</h1>
  <p class="subtitle">Historical capacity data and predicted capacity at every 15-minute interval.</p>

  <!-- ── PREDICT ── -->
  <section>
    <h2>Predict Capacity</h2>
    <div class="controls">
      <div class="field">
        <label for="date-input">Date</label>
        <input type="date" id="date-input">
      </div>
      <div class="field">
        <label for="time-select">Time</label>
        <select id="time-select"></select>
      </div>
    </div>

    <div class="metrics">
      <div class="metric-card">
        <div class="label">Neural Network (MLP)</div>
        <div class="value" id="mlp-value">—</div>
        <div class="sublabel" id="mlp-sub">PyTorch 3-layer neural network</div>
      </div>
      <div class="metric-card">
        <div class="label">Random Forest</div>
        <div class="value" id="rf-value">—</div>
        <div class="sublabel" id="rf-sub">Ensemble of 100 decision trees</div>
      </div>
    </div>

    <p class="caption" id="metrics-caption"></p>

    <div class="chart-wrap">
      <canvas id="importance-chart" height="260"></canvas>
    </div>
  </section>

  <!-- ── WEEKLY PATTERNS ── -->
  <section>
    <h2>Weekly Patterns</h2>
    <div class="controls">
      <div class="field">
        <label for="day-select">Day</label>
        <select id="day-select">
          <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
          <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
        </select>
      </div>
      <div class="field">
        <label for="range-select">Data range</label>
        <select id="range-select">
          <option>Last week</option><option>Last month</option>
          <option>Last 6 months</option><option>Last year</option><option>All time</option>
        </select>
      </div>
      <div class="field-checkbox">
        <input type="checkbox" id="semester-check" checked>
        <label for="semester-check">Semester only</label>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="weekly-chart" height="220"></canvas>
    </div>
  </section>

  <footer id="footer"></footer>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const FEATURE_LABELS = {
  hour_numeric:   'Time of day',
  week_of_year:   'Week of year',
  is_weekend:     'Weekend',
  is_finals:      'Finals week',
  is_dead_week:   'Dead week',
  is_first_week:  'First week of semester',
  is_break:       'Break period',
  is_holiday:     'Holiday',
  day_Monday:     'Monday',
  day_Tuesday:    'Tuesday',
  day_Wednesday:  'Wednesday',
  day_Thursday:   'Thursday',
  day_Friday:     'Friday',
  day_Saturday:   'Saturday',
  day_Sunday:     'Sunday',
};

const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

// ── Helpers ────────────────────────────────────────────────────────────────
function getPTNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
}

function getOpenHours(jsDay) {
  if (jsDay === 6) return { open: 8, close: 18 }; // Saturday
  if (jsDay === 0) return { open: 8, close: 23 }; // Sunday
  return { open: 7, close: 23 };                  // Mon–Fri
}

function formatHour(h) {
  if (h === 0 || h === 24) return '12 AM';
  if (h === 12) return '12 PM';
  return h > 12 ? `${h - 12} PM` : `${h} AM`;
}

function formatTime(h, m) {
  const period = h >= 12 ? 'PM' : 'AM';
  const dh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return m === 0 ? `${dh}:00 ${period}` : `${dh}:${String(m).padStart(2, '0')} ${period}`;
}

function todayPT() {
  const pt = getPTNow();
  const y = pt.getFullYear();
  const m = String(pt.getMonth() + 1).padStart(2, '0');
  const d = String(pt.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ── Status Banner ──────────────────────────────────────────────────────────
function updateBanner() {
  const pt = getPTNow();
  const hour = pt.getHours();
  const jsDay = pt.getDay();
  const { open, close } = getOpenHours(jsDay);
  const isOpen = hour >= open && hour < close;
  const banner = document.getElementById('status-banner');
  banner.className = `banner ${isOpen ? 'open' : 'closed'}`;
  banner.textContent = isOpen ? '✓ RSF is currently OPEN' : '✗ RSF is currently CLOSED';
}

// ── Time Picker ────────────────────────────────────────────────────────────
function populateTimePicker(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const jsDay = d.getDay();
  const { open, close } = getOpenHours(jsDay);
  const sel = document.getElementById('time-select');
  const prev = sel.value;
  sel.innerHTML = '';

  for (let h = open; h < close; h++) {
    for (const m of [0, 15, 30, 45]) {
      const val = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      const opt = document.createElement('option');
      opt.value = val;
      opt.textContent = formatTime(h, m);
      sel.appendChild(opt);
    }
  }

  if ([...sel.options].some(o => o.value === prev)) {
    sel.value = prev;
  } else {
    const pt = getPTNow();
    const cur = pt.getHours() * 60 + pt.getMinutes();
    let best = sel.options[0];
    let bestDiff = Infinity;
    for (const o of sel.options) {
      const [h, m] = o.value.split(':').map(Number);
      const diff = Math.abs(h * 60 + m - cur);
      if (diff < bestDiff) { bestDiff = diff; best = o; }
    }
    sel.value = best.value;
  }
}

// ── Prediction Lookup ──────────────────────────────────────────────────────
function updatePrediction(data) {
  const date = document.getElementById('date-input').value;
  const time = document.getElementById('time-select').value;
  const key = `${date}_${time}`;
  const pred = data.predictions[key];

  const mlpEl  = document.getElementById('mlp-value');
  const rfEl   = document.getElementById('rf-value');
  const mlpSub = document.getElementById('mlp-sub');
  const rfSub  = document.getElementById('rf-sub');

  if (!pred) {
    mlpEl.textContent = '—';
    rfEl.textContent  = '—';
    mlpSub.textContent = 'PyTorch 3-layer neural network';
    rfSub.textContent  = 'Ensemble of 100 decision trees';
    return;
  }

  const [rf, mlp] = pred;
  mlpEl.textContent = `${mlp}%`;
  rfEl.textContent  = `${rf}%`;
  mlpSub.textContent = mlp >= 100 ? 'At or over capacity' : `avg error ±${data.metrics.mlp_mae}%`;
  rfSub.textContent  = rf  >= 100 ? 'At or over capacity' : `avg error ±${data.metrics.rf_mae}%`;
}

// ── Feature Importance Chart ───────────────────────────────────────────────
function initImportanceChart(data) {
  const items = [...data.feature_importances].reverse(); // ascending so top is at top
  const labels = items.map(d => FEATURE_LABELS[d.name] || d.name);
  const values = items.map(d => d.value);

  new Chart(document.getElementById('importance-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: '#FDB927',
        borderRadius: 3,
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: 'What Drives Predictions (Random Forest feature importances)',
          color: '#ccc',
          font: { size: 13 },
          padding: { bottom: 12 },
        },
        tooltip: {
          callbacks: {
            label: (item) => ` ${item.raw.toFixed(3)}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#2a2a2a' },
          ticks: { color: '#888', font: { size: 11 } },
          title: { display: true, text: 'Importance Score', color: '#666', font: { size: 11 } },
        },
        y: {
          grid: { display: false },
          ticks: { color: '#ccc', font: { size: 12 } },
        }
      }
    }
  });
}

// ── Weekly Patterns Chart ─────────────────────────────────────────────────
let weeklyChart = null;

function updateWeeklyChart(data) {
  const day      = document.getElementById('day-select').value;
  const range    = document.getElementById('range-select').value;
  const semester = document.getElementById('semester-check').checked;
  const key      = `${day}|${range}|${semester}`;
  const points   = data.weekly[key] || [];

  const d = new Date(`2000-01-03T12:00:00`); // arbitrary Monday
  const offset = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(day);
  d.setDate(3 + offset);
  const jsDay = d.getDay();
  const { open, close } = getOpenHours(jsDay);

  if (weeklyChart) {
    weeklyChart.data.datasets[0].data = points;
    weeklyChart.options.scales.x.min = open;
    weeklyChart.options.scales.x.max = close;
    weeklyChart.update();
    return;
  }

  weeklyChart = new Chart(document.getElementById('weekly-chart'), {
    type: 'line',
    data: {
      datasets: [{
        data: points,
        borderColor: '#FDB927',
        backgroundColor: 'rgba(253,185,39,0.08)',
        borderWidth: 2.5,
        pointRadius: 3,
        pointBackgroundColor: '#FDB927',
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      parsing: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => items[0].raw.label || '',
            label: (item) => ` ${item.raw.y.toFixed(1)}% avg capacity`,
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          min: open,
          max: close,
          grid: { color: '#222' },
          ticks: {
            color: '#888',
            font: { size: 11 },
            stepSize: 1,
            callback: (v) => Number.isInteger(v) ? formatHour(v) : '',
          }
        },
        y: {
          min: 0,
          max: 110,
          grid: { color: '#222' },
          ticks: {
            color: '#888',
            font: { size: 11 },
            callback: (v) => `${v}%`,
          },
          title: { display: true, text: 'Average Capacity (%)', color: '#666', font: { size: 11 } },
        }
      }
    }
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function init() {
  updateBanner();

  const res = await fetch('data.json');
  const data = await res.json();

  // Default date = today PT
  const dateInput = document.getElementById('date-input');
  dateInput.value = todayPT();

  // Default day select = today
  const pt = getPTNow();
  document.getElementById('day-select').value = DAYS[pt.getDay()];

  // Populate time picker for today
  populateTimePicker(dateInput.value);

  // Wire up events
  dateInput.addEventListener('change', () => {
    populateTimePicker(dateInput.value);
    updatePrediction(data);
  });
  document.getElementById('time-select').addEventListener('change', () => updatePrediction(data));
  document.getElementById('day-select').addEventListener('change', () => updateWeeklyChart(data));
  document.getElementById('range-select').addEventListener('change', () => updateWeeklyChart(data));
  document.getElementById('semester-check').addEventListener('change', () => updateWeeklyChart(data));

  // Initial renders
  updatePrediction(data);
  initImportanceChart(data);
  updateWeeklyChart(data);

  // Metrics caption
  const m = data.metrics;
  document.getElementById('metrics-caption').textContent =
    `Last trained: ${m.trained_at} on ${m.training_rows.toLocaleString()} rows — ` +
    `MLP avg error: ±${m.mlp_mae}%,  RF avg error: ±${m.rf_mae}%`;

  // Footer
  document.getElementById('footer').textContent = `Data updated: ${data.built_at}`;
}

init();
</script>
</body>
</html>
