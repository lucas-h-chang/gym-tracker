<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bear Meter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://njhxcwcvyorwqlfacnal.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0f;
      --text:       #e8e6e3;
      --sub:        #8a8480;
      --muted:      #4a4540;
      --border:     rgba(255,255,255,0.06);
      --font:       'Inter', -apple-system, sans-serif;
      --mono:       'JetBrains Mono', monospace;
      --cap-green:     #6ee7b7;
      --cap-yellow:    #fbbf24;
      --cap-red:       #f87171;
      --cap-dark-red:  #b91c1c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Data Warning ── */
    #data-warning {
      display: none;
      text-align: center;
      padding: 10px 24px;
      font-size: 11px;
      letter-spacing: 0.05em;
      font-family: var(--mono);
      background: rgba(248, 113, 113, 0.07);
      border-bottom: 1px solid rgba(248, 113, 113, 0.12);
      color: #f87171;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      margin-top: 16px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .about-link {
      font-size: 15px;
      font-weight: 500;
      color: var(--sub);
      text-decoration: none;
      transition: color 0.15s;
    }
    .about-link:hover { color: var(--text); }

    /* ── Insight Cards ── */
    .insight-row {
      display: flex;
      gap: 48px;
      padding: 32px 48px 36px;
    }
    .insight-row.hidden { display: none; }
    .insight-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      min-height: 120px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--sub);
      text-transform: uppercase;
      line-height: 1;
    }
    .card-value {
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .val-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .card-sub {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.2;
    }
    .card-sub a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Capacity bar */
    .cap-bar-wrap { width: 100%; }
    .cap-bar-track {
      height: 7px;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      overflow: hidden;
    }
    .cap-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--cap-green);
      transition: width 0.6s ease, background 0.4s;
    }
    .cap-bar-fill.mid      { background: var(--cap-yellow); }
    .cap-bar-fill.high     { background: var(--cap-red); }
    .cap-bar-fill.critical { background: var(--cap-dark-red); }

    /* Comparison verdict colors */
    .comp-verdict.much-busier  { color: #dc2626; }
    .comp-verdict.busier       { color: #f87171; }
    .comp-verdict.bit-busier   { color: #fca5a5; }
    .comp-verdict.much-quieter { color: #059669; }
    .comp-verdict.quieter      { color: #6ee7b7; }
    .comp-verdict.bit-quieter  { color: #a7f3d0; }
    .comp-verdict.average      { color: var(--text); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 48px;
    }

    /* ── Chart Sections ── */
    .chart-section {
      position: relative;
      padding: 32px 48px 0;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .chart-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .chart-wrap {
      position: relative;
    }
    .chart-wrap canvas {
      display: block;
      width: 100% !important;
    }

    /* ── Day Pills ── */
    .day-pills {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .pill {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 7px 18px;
      background: transparent;
      color: var(--sub);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      line-height: 1;
    }
    .pill:hover {
      border-color: rgba(255,255,255,0.22);
      color: var(--text);
    }
    .pill.active {
      background: #ececec;
      border-color: #ececec;
      color: #0a0a0f;
      font-weight: 600;
    }
    .pill-cal {
      letter-spacing: 0.04em;
    }

    /* ── Calendar Popup ── */
    .cal-popup {
      position: absolute;
      background: #141310;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      width: 260px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-month-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .cal-nav-btn {
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      font-size: 15px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .cal-nav-btn:hover { color: var(--text); }
    .cal-nav-btn:disabled { opacity: 0.2; cursor: default; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-dow {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 4px 0;
      font-weight: 600;
    }
    .cal-day {
      text-align: center;
      padding: 6px 2px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--sub);
      transition: background 0.12s, color 0.12s;
    }
    .cal-day:hover:not(.cal-day-disabled):not(.cal-day-selected) {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }
    .cal-day-disabled { opacity: 0.2; cursor: default; pointer-events: none; }
    .cal-day-selected { background: var(--cap-green); color: #000; font-weight: 700; }
    .cal-day-today { color: var(--cap-green); font-weight: 700; }
    .cal-day-selected.cal-day-today { color: #000; }
    .cal-day-empty { pointer-events: none; }

    /* ── Footer ── */
    footer {
      padding: 16px 48px;
      text-align: right;
    }
    footer span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* ── Pulse Dot (live indicator) ── */
    .pulse-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      pointer-events: none;
      z-index: 10;
      --dot-rgb: 110, 231, 183;
    }
    .pulse-dot::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: rgba(var(--dot-rgb), 0.35);
      animation: pulse-ring 2s ease-out infinite;
    }
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: rgb(var(--dot-rgb));
      box-shadow: 0 0 8px rgba(var(--dot-rgb), 0.5);
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 0.9; }
      70%  { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* ── Chart Tooltip (custom HTML — sits above the pulse dot, unlike
       Chart.js's canvas-drawn tooltip which the dot always painted over) ── */
    .chart-tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      background: #1e1c1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      opacity: 0;
      white-space: nowrap;
    }
    .chart-tooltip .tt-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 6px;
    }
    .chart-tooltip .tt-row {
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
    }
    .chart-tooltip .tt-row b { font-weight: 700; }

    /* ── Skeleton Loading ── */
    @keyframes skel-pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }
    .skel {
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      animation: skel-pulse 1.5s ease-in-out infinite;
    }
    .skel-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      padding: 0;
      z-index: 2;
      background: var(--bg);
    }
    body.loading .skel-overlay        { display: flex; }
    body.loading #insight-row         { display: flex !important; }
    body.loading .chart-wrap canvas   { visibility: hidden; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .insight-row {
        flex-direction: column;
        padding: 20px 24px;
        gap: 28px;
      }
      .chart-section { padding: 24px 20px 0; }
      header { padding: 0 24px; }
      .divider { margin: 0 24px; }
      .chart-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }
      .day-pills {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;
        width: 100%;
      }
      footer { padding: 16px 24px; }
      .card-value { font-size: 33px; }
    }
  </style>
</head>
<body class="loading">

<div id="data-warning"></div>

<header>
  <div class="logo">Bear Meter</div>
  <a href="about.html" class="about-link">About</a>
</header>

<main>

  <!-- INSIGHT CARDS -->
  <div class="insight-row hidden" id="insight-row">
    <div class="insight-card" id="insight-status">
      <div class="skel-overlay">
        <div class="skel" style="width:60%;height:12px"></div>
        <div class="skel" style="width:50%;height:42px;animation-delay:.1s"></div>
        <div class="skel" style="width:100%;height:7px;animation-delay:.15s"></div>
        <div class="skel" style="width:40%;height:12px;animation-delay:.2s"></div>
      </div>
      <span class="card-label" id="insight-status-label">LIVE CAPACITY</span>
      <div class="val-row">
        <span class="card-value" id="insight-pct">&mdash;</span>
        <span class="card-label" id="insight-pct-tag"></span>
      </div>
      <div class="cap-bar-wrap">
        <div class="cap-bar-track"><div class="cap-bar-fill" id="insight-cap-fill" style="width:0%"></div></div>
      </div>
      <span class="card-sub" id="insight-cap-label">&mdash;</span>
    </div>

    <div class="insight-card" id="insight-trend">
      <div class="skel-overlay">
        <div class="skel" style="width:70%;height:12px"></div>
        <div class="skel" style="width:45%;height:42px;animation-delay:.1s"></div>
        <div class="skel" style="width:35%;height:14px;animation-delay:.15s"></div>
      </div>
      <span class="card-label">IN THE NEXT 30 MIN</span>
      <span class="card-value" id="insight-trend-val">&mdash;</span>
      <span class="card-sub" id="insight-trend-sub"></span>
    </div>

    <div class="insight-card" id="insight-comparison">
      <div class="skel-overlay">
        <div class="skel" style="width:80%;height:12px"></div>
        <div class="skel" style="width:55%;height:42px;animation-delay:.1s"></div>
        <div class="skel" style="width:45%;height:14px;animation-delay:.15s"></div>
      </div>
      <span class="card-label" id="insight-comp-header">COMPARED TO USUAL &mdash;</span>
      <span class="card-value" id="insight-comp-verdict">&mdash;</span>
      <span class="card-sub" id="insight-comp-delta"></span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- PREDICTION CHART -->
  <div class="chart-section" id="section-predict">
    <div class="chart-header">
      <h2 class="chart-title" id="chart-title">Today's Crowd</h2>
      <div class="day-pills" id="day-pills"></div>
    </div>
    <div id="cal-popup" class="cal-popup" style="display:none"></div>
    <div class="chart-wrap">
      <canvas id="pred-chart" height="340"></canvas>
      <div id="pulse-dot" class="pulse-dot" style="display:none"></div>
      <div id="pred-tooltip" class="chart-tooltip"></div>
    </div>
  </div>


</main>

<footer>
  <span id="footer-built"></span>
</footer>

<script>
const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

// ── Supabase config ────────────────────────────────────────────
const SB_URL      = 'https://njhxcwcvyorwqlfacnal.supabase.co';
const SB_ANON_KEY = 'sb_publishable_in5UWgu0ZCkriOULxBZ8GA_kKJ0qUvA';

async function sbFetch(path) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SB_ANON_KEY, 'Authorization': `Bearer ${SB_ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}: ${path}`);
  return res.json();
}

const _ptBounds = {};
function _getPTBounds(year) {
  if (_ptBounds[year]) return _ptBounds[year];
  const mar1       = Date.UTC(year, 2, 1);
  const mar1dow    = new Date(mar1).getUTCDay();
  const firstSunMar = mar1 + (mar1dow === 0 ? 0 : (7 - mar1dow)) * 86400000;
  const dstStart   = firstSunMar + 7 * 86400000 + 10 * 3600000;
  const nov1       = Date.UTC(year, 10, 1);
  const nov1dow    = new Date(nov1).getUTCDay();
  const firstSunNov = nov1 + (nov1dow === 0 ? 0 : (7 - nov1dow)) * 86400000;
  const dstEnd     = firstSunNov + 9 * 3600000;
  return (_ptBounds[year] = { dstStart, dstEnd });
}
function slotTsToKey(slotTs) {
  const ms = Date.parse(slotTs);
  const { dstStart, dstEnd } = _getPTBounds(new Date(ms).getUTCFullYear());
  const ptMs = ms + ((ms >= dstStart && ms < dstEnd) ? -7 : -8) * 3600000;
  const d = new Date(ptMs);
  return (
    d.getUTCFullYear() + '-' +
    String(d.getUTCMonth() + 1).padStart(2, '0') + '-' +
    String(d.getUTCDate()).padStart(2, '0') + '_' +
    String(d.getUTCHours()).padStart(2, '0') + ':' +
    String(d.getUTCMinutes()).padStart(2, '0')
  );
}

function slotToLabel(h) {
  const hour   = Math.floor(h);
  const min    = Math.round((h - hour) * 60);
  const period = hour >= 12 ? 'PM' : 'AM';
  const dh     = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
  return min === 0 ? `${dh}:00 ${period}` : `${dh}:${String(min).padStart(2,'0')} ${period}`;
}

const RANGE_DB_TO_DISPLAY = {
  'last_week': 'Last 7 days', 'last_month': 'Last month',
  'last_6_months': 'Last 6 months', 'last_year': 'Last year',
  'all_time': 'All time', 'this_semester': 'This semester',
  // All-time slices partitioned by academic period, for the "compared to
  // usual <Day>s" card (see weekly_builder.py period_type / _emit_day_records).
  'all_summers': 'All summers', 'all_semesters': 'All semesters',
  'all_breaks': 'All breaks',
};

function buildTodayActuals(rows, today) {
  const bins = {};
  rows.forEach(row => {
    const d  = new Date(row.timestamp);
    const pt = new Date(d.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
    const ds = `${pt.getFullYear()}-${String(pt.getMonth()+1).padStart(2,'0')}-${String(pt.getDate()).padStart(2,'0')}`;
    if (ds !== today) return;
    const total   = pt.getHours() * 60 + pt.getMinutes();
    const rounded = Math.round(total / 15) * 15;
    const h = Math.floor(rounded / 60), m = rounded % 60;
    const key = h + m / 60;
    if (!bins[key]) bins[key] = { sum: 0, n: 0, h, m };
    bins[key].sum += row.percent_full;
    bins[key].n   += 1;
  });
  return Object.values(bins)
    .sort((a, b) => (a.h + a.m/60) - (b.h + b.m/60))
    .map(b => ({ x: b.h + b.m/60, y: Math.round(b.sum/b.n*10)/10, label: formatTime(b.h, b.m) }));
}

let liveCapacity  = null;

function getPTNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
}

// Manual JS mirror of academic_calendar.py's SUMMER_RANGES (Python consolidated
// there 2026-07-21 — see CLAUDE.md). This frontend copy and RSFApp2.0's
// TimeUtils.swift are NOT auto-generated from the Python source; keep all
// three in sync by hand when adding a new year.
const SUMMER_RANGES = [
  ['2024-05-10','2024-08-24'], ['2025-05-16','2025-08-23'],
  ['2026-05-15','2026-08-22'], ['2027-05-14','2027-08-21'],
];

function isSummerHours(date) {
  const ds = (date instanceof Date ? date : new Date(date)).toLocaleDateString('en-CA');
  return SUMMER_RANGES.some(([s, e]) => ds >= s && ds <= e);
}

// Manual JS mirror of academic_calendar.py's BREAK_RANGES (winter + spring +
// summer break). Like SUMMER_RANGES above, NOT auto-generated — keep in sync
// by hand when adding a year. Used only by periodTypeOf() to classify TODAY
// for the "compared to usual <Day>s" card, so it mirrors weekly_builder.py's
// period_type() exactly (summer peeled off first via isSummerHours, then a
// non-in-session day is a "break").
const BREAK_RANGES = [
  // winter
  ['2020-12-18','2021-01-18'], ['2021-12-17','2022-01-17'], ['2022-12-16','2023-01-16'],
  ['2023-12-15','2024-01-15'], ['2024-12-20','2025-01-20'], ['2025-12-19','2026-01-19'],
  ['2026-12-18','2027-01-18'], ['2027-12-17','2028-01-17'],
  // spring
  ['2021-03-20','2021-03-28'], ['2022-03-19','2022-03-27'], ['2023-03-25','2023-04-02'],
  ['2024-03-23','2024-03-31'], ['2025-03-22','2025-03-30'], ['2026-03-21','2026-03-29'],
  ['2027-03-20','2027-03-28'], ['2028-03-25','2028-04-02'],
  // summer break (is_semester_day is false across these; summer session is
  // peeled off first by isSummerHours, so these only catch the ~3-day tail
  // between summer session end and the fall academic-hours flip)
  ['2021-05-14','2021-08-24'], ['2022-05-13','2022-08-23'], ['2023-05-12','2023-08-22'],
  ['2024-05-10','2024-08-27'], ['2025-05-16','2025-08-26'], ['2026-05-15','2026-08-25'],
  ['2027-05-14','2027-08-24'],
];

function isSemesterDay(date) {
  const ds = (date instanceof Date ? date : new Date(date)).toLocaleDateString('en-CA');
  return !BREAK_RANGES.some(([s, e]) => ds >= s && ds <= e);
}

// summer / semester / break, matching weekly_builder.py period_type().
function periodTypeOf(date) {
  if (isSummerHours(date))  return 'summer';
  if (!isSemesterDay(date)) return 'break';
  return 'semester';
}

// period_type -> the weekly_averages range_type carrying that all-time slice.
const PERIOD_RANGE_TYPE = {
  summer: 'all_summers', semester: 'all_semesters', break: 'all_breaks',
};

function getOpenHours(jsDay, date) {
  const summer = date != null && isSummerHours(date);
  if (jsDay === 6) return { open: 8, close: 18 };
  if (jsDay === 0) return { open: 8, close: summer ? 20 : 23 };
  return { open: 7, close: summer ? 20 : 23 };
}

function formatHour(h) {
  if (h === 0 || h === 24) return '12 AM';
  if (h === 12) return '12 PM';
  return h > 12 ? `${h - 12} PM` : `${h} AM`;
}

function formatTime(h, m) {
  const period = h >= 12 ? 'PM' : 'AM';
  const dh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return m === 0 ? `${dh}:00 ${period}` : `${dh}:${String(m).padStart(2, '0')} ${period}`;
}

function todayPT() {
  const pt = getPTNow();
  return `${pt.getFullYear()}-${String(pt.getMonth()+1).padStart(2,'0')}-${String(pt.getDate()).padStart(2,'0')}`;
}

function pctColor(p) {
  if (p >= 90) return '#b91c1c';
  if (p >= 80) return '#f87171';
  if (p >= 60) return '#fbbf24';
  return '#6ee7b7';
}

function pctColorRGB(p) {
  if (p >= 90) return '185, 28, 28';
  if (p >= 80) return '248, 113, 113';
  if (p >= 60) return '251, 191, 36';
  return '110, 231, 183';
}

// Custom HTML tooltip renderer, replacing Chart.js's canvas-drawn tooltip.
// Needed so (a) it can sit above the pulse dot via z-index instead of the
// dot always painting over it, and (b) the numeric value can be bolded —
// canvas tooltips render each line in one uniform font, no per-word styling.
function makeExternalTooltip(tooltipId) {
  return (context) => {
    const el = document.getElementById(tooltipId);
    if (!el) return;
    const tt = context.tooltip;

    if (tt.opacity === 0) {
      el.style.opacity = 0;
      return;
    }

    let html = '';
    if (tt.title?.length) {
      html += `<div class="tt-title">${tt.title[0]}</div>`;
    }
    (tt.body || []).forEach(b => {
      b.lines.forEach(line => {
        const bolded = line.replace(/\d+/, (m) => `<b>${m}</b>`);
        html += `<div class="tt-row">${bolded}</div>`;
      });
    });
    el.innerHTML = html;

    // Measure off-screen first so we know which side to place the box on.
    el.style.left = '0px';
    el.style.top  = '0px';
    const w = el.offsetWidth;
    const h = el.offsetHeight;

    const gap = 14;
    const chartArea = context.chart.chartArea;
    const preferLeft = tt.caretX - w - gap >= chartArea.left;
    const left = preferLeft ? (tt.caretX - w - gap) : (tt.caretX + gap);
    const top  = tt.caretY - h / 2;

    el.style.left = left + 'px';
    el.style.top  = top + 'px';
    el.style.opacity = 1;
  };
}

// ── Status ─────────────────────────────────────────────────────
function updateStatusBar() {
  const pt = getPTNow();
  const { open, close } = getOpenHours(pt.getDay(), pt);
  const isOpen = pt.getHours() >= open && pt.getHours() < close;
  if (isOpen) {
    fetch('/api/live-capacity')
      .then(r => r.json())
      .then(d => {
        const pct = Math.round(d.capacity_pct);
        const count = Math.round((pct / 100) * 150);
        liveCapacity = { count, pct };
        if (window._insightData) renderInsightCards(window._insightData);
      })
      .catch(() => {});
  }
}

// ── Prediction Chart ───────────────────────────────────────────
let predChart = null;
let predDate  = '';

function shiftDate(dateStr, delta) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function chartTitle(dateStr) {
  const today = todayPT();
  if (dateStr === today) return "Today's Crowd";
  if (dateStr === shiftDate(today, 1)) return "Tomorrow's Crowd";
  const d = new Date(dateStr + 'T12:00:00');
  return `${DAYS[d.getDay()]}'s Crowd`;
}

function buildPredPoints(data, dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const { open, close } = getOpenHours(d.getDay(), d);
  const points = [];
  for (let h = open; h < close; h++) {
    for (const m of [0, 15, 30, 45]) {
      const key = `${dateStr}_${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const pred = data.predictions[key];
      if (pred == null) continue;
      points.push({ x: h + m / 60, y: Math.round(pred * 10) / 10, label: formatTime(h, m) });
    }
  }
  points.push({ x: close, y: 0, label: formatTime(close, 0) });
  return points;
}

// ── Chart.js Plugins ─────────────────────────────────────────

// Gradient that maps chart color to capacity value (green → yellow → red)
const capacityGradientPlugin = {
  id: 'capacityGradient',
  // Chart.js resolves each line's fill color from dataset.backgroundColor
  // during the *update* phase (before Filler ever draws), not the draw
  // phase — so this must run in beforeDatasetsUpdate, not beforeDatasetsDraw,
  // or the gradient lags one full update cycle behind (invisible on first load).
  beforeDatasetsUpdate(chart) {
    if (!chart.options.plugins?.capacityGradient?.enabled) return;
    const { ctx, scales } = chart;
    if (!scales?.y) return;

    const yBottom = scales.y.getPixelForValue(0);
    const yTop    = scales.y.getPixelForValue(110);

    chart.data.datasets.forEach((ds, i) => {
      const lineOp = ds._predicted ? 0.55 : 1.0;
      const fillOp = ds._predicted ? 0.15 : 0.35;

      const lg = ctx.createLinearGradient(0, yBottom, 0, yTop);
      lg.addColorStop(0,       `rgba(110,231,183,${lineOp})`);
      lg.addColorStop(45/110,  `rgba(110,231,183,${lineOp})`);
      lg.addColorStop(60/110,  `rgba(251,191,36,${lineOp})`);
      lg.addColorStop(80/110,  `rgba(248,113,113,${lineOp})`);
      lg.addColorStop(1,       `rgba(185,28,28,${lineOp})`);
      ds.borderColor = lg;

      const fg = ctx.createLinearGradient(0, yBottom, 0, yTop);
      fg.addColorStop(0,       `rgba(110,231,183,${fillOp * 0.1})`);
      fg.addColorStop(0.08,    `rgba(110,231,183,${fillOp * 0.45})`);
      fg.addColorStop(45/110,  `rgba(110,231,183,${fillOp})`);
      fg.addColorStop(60/110,  `rgba(251,191,36,${fillOp})`);
      fg.addColorStop(80/110,  `rgba(248,113,113,${fillOp})`);
      fg.addColorStop(1,       `rgba(185,28,28,${fillOp})`);
      ds.backgroundColor = fg;
    });
  }
};

// NOW indicator: pulsing dot at the live point (positioned via CSS element).
// The live point itself — same x/y the actual line is extended to and the
// predicted line bridges from in updatePredChart() — is what's rendered
// here, so the dot always sits exactly where the two lines meet.
const nowLinePlugin = {
  id: 'nowLine',
  afterDatasetsDraw(chart) {
    const opts = chart.options.plugins.nowLine;
    const pulseDot = document.getElementById('pulse-dot');

    if (!opts?.show) {
      if (pulseDot) pulseDot.style.display = 'none';
      return;
    }

    const actualData = chart.data.datasets[0]?.data || [];
    const lastPt = actualData[actualData.length - 1];
    if (!lastPt) {
      if (pulseDot) pulseDot.style.display = 'none';
      return;
    }

    positionPulseDot(chart, lastPt);
  }
};

function positionPulseDot(chart, lastPt) {
  const pulseDot = document.getElementById('pulse-dot');
  if (!pulseDot) return;

  const { scales } = chart;
  const dotX = scales.x.getPixelForValue(lastPt.x);
  const dotY = scales.y.getPixelForValue(lastPt.y);

  pulseDot.style.display = 'block';
  pulseDot.style.left = (dotX - 7) + 'px';
  pulseDot.style.top  = (dotY - 7) + 'px';
  pulseDot.style.setProperty('--dot-rgb', pctColorRGB(lastPt.y));
}

// The chart's data only advances when updatePredChart() re-runs (page load,
// day switch), so without this the live point — and the dot sitting on it —
// would freeze at whatever time the page happened to load. Recompute it
// every 15s so the line, its fill, and the dot all keep creeping forward
// together and never drift apart.
setInterval(() => {
  if (!predChart || predDate !== todayPT()) return;
  if (window._insightData) updatePredChart(window._insightData);
}, 15000);

// Scrub line on hover
const scrubLinePlugin = {
  id: 'scrubLine',
  afterDraw(chart) {
    const active = chart.tooltip?.getActiveElements();
    if (!active || !active.length) return;
    const { ctx, chartArea: a } = chart;
    const x = active[0].element.x;
    if (x < a.left || x > a.right) return;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x, a.top);
    ctx.lineTo(x, a.bottom);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
};

// ── Day Pills ────────────────────────────────────────────────
function buildPillDates() {
  const today = todayPT();
  const pills = [
    { label: 'Today', date: today },
    { label: 'Tomorrow', date: shiftDate(today, 1) },
  ];
  for (let i = 2; i <= 4; i++) {
    const d = new Date(shiftDate(today, i) + 'T12:00:00');
    pills.push({
      label: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()],
      date: shiftDate(today, i)
    });
  }
  return pills;
}

function renderPills(data) {
  const container = document.getElementById('day-pills');
  const pills = buildPillDates();
  container.innerHTML = '';

  pills.forEach(p => {
    const btn = document.createElement('button');
    btn.className = `pill${p.date === predDate ? ' active' : ''}`;
    btn.textContent = p.label;
    btn.dataset.date = p.date;
    btn.addEventListener('click', () => {
      predDate = p.date;
      updatePredChart(data);
      renderInsightCards(data);
      updatePillStates();
    });
    container.appendChild(btn);
  });

  const calBtn = document.createElement('button');
  calBtn.className = 'pill pill-cal';
  calBtn.textContent = 'More';
  calBtn.id = 'cal-trigger';
  if (!pills.some(p => p.date === predDate)) calBtn.classList.add('active');
  container.appendChild(calBtn);
}

function updatePillStates() {
  const pills = buildPillDates();
  document.querySelectorAll('.pill').forEach(el => {
    if (el.classList.contains('pill-cal')) {
      el.classList.toggle('active', !pills.some(p => p.date === predDate));
    } else {
      el.classList.toggle('active', el.dataset.date === predDate);
    }
  });
}

// ── Prediction Chart ─────────────────────────────────────────
function updatePredChart(data) {
  const today    = todayPT();
  const isToday  = predDate === today;
  const pt       = getPTNow();
  const nowVal   = pt.getHours() + pt.getMinutes() / 60;
  const predDay  = new Date(predDate + 'T12:00:00');
  const xMin     = 7;
  const xMax     = 23;

  // The pulse dot sits on the live point at "now". Past closing (or before
  // open) there's no actual line for it to cap, so it would float alone in
  // empty space — only show it while the gym is actually open.
  const { open: openH, close: closeH } = getOpenHours(predDay.getDay(), predDay);
  const gymIsOpen = pt.getHours() >= openH && pt.getHours() < closeH;
  const showNow   = isToday && gymIsOpen;

  const allPredPoints = buildPredPoints(data, predDate);
  const actualPoints = isToday
    ? (data.today_actuals || []).filter(p => p.x <= nowVal)
    : [];
  let predPoints = isToday
    ? allPredPoints.filter(p => p.x >= nowVal)
    : allPredPoints;

  if (isToday && data.today_similarity_preds?.length) {
    // Blend weight is per-slot ('w'): full trust near the last observation,
    // decaying to the base curve within ~2h (see today_builder.py). Fall back
    // to the scalar blend_weight for older cached rows that lack per-point w.
    const simMap = {};
    data.today_similarity_preds.forEach(p => { simMap[p.x] = p; });
    predPoints = predPoints.map(p => {
      const sim = simMap[p.x];
      if (sim == null) return p;
      const w = sim.w != null ? sim.w : (data.today_blend_weight || 0);
      return { ...p, y: Math.round(((1 - w) * p.y + w * sim.y) * 10) / 10 };
    });
  }

  // Extend the actual line all the way to "right now" (not just the last
  // completed 15-min bin) using the live capacity reading, then bridge the
  // predicted line from that exact same point. This is also what the pulse
  // dot renders on top of, so the line, its fill, and the dot all meet at
  // one spot instead of the dot floating off the end of the line — and the
  // sliver of time between the last bin and now gets shaded as "actual"
  // since it's already passed, instead of being left blank.
  if (isToday && actualPoints.length && gymIsOpen) {
    const lastActual = actualPoints[actualPoints.length - 1];
    const liveX = Math.min(Math.max(nowVal, lastActual.x), xMax);
    const liveY = liveCapacity ? liveCapacity.pct : lastActual.y;
    const livePoint = { x: liveX, y: liveY, label: formatTime(pt.getHours(), pt.getMinutes()) };

    if (liveX > lastActual.x) {
      actualPoints.push(livePoint);
    } else {
      actualPoints[actualPoints.length - 1] = livePoint;
    }
    if (!predPoints.length || predPoints[0].x > liveX) {
      predPoints = [livePoint, ...predPoints];
    }
  } else if (isToday && actualPoints.length && nowVal >= closeH) {
    // Day is over. There's no live point to extend to, and the predicted
    // (close, 0) point was filtered out by p.x >= nowVal, so the actual line
    // would otherwise end flat at its last non-zero reading. Drop it to 0 at
    // close so today looks like every other finished day.
    const lastActual = actualPoints[actualPoints.length - 1];
    if (lastActual.x < closeH) {
      actualPoints.push({ x: closeH, y: 0, label: formatTime(closeH, 0) });
    } else {
      actualPoints[actualPoints.length - 1] = { x: closeH, y: 0, label: formatTime(closeH, 0) };
    }
  }

  document.getElementById('chart-title').textContent = chartTitle(predDate);
  updatePillStates();

  if (predChart) {
    predChart.data.datasets[0].data = actualPoints;
    predChart.data.datasets[1].data = predPoints;
    predChart.options.plugins.nowLine.show  = showNow;
    predChart.options.plugins.nowLine.value = nowVal;
    predChart.options.scales.x.min          = xMin;
    predChart.options.scales.x.max          = xMax;
    predChart.update();
    return;
  }

  const ctx = document.getElementById('pred-chart').getContext('2d');

  predChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Actual',
          data: actualPoints,
          borderColor: '#6ee7b7',
          backgroundColor: 'transparent',
          borderWidth: 3.25,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointBackgroundColor: '#fff',
          pointBorderColor: 'transparent',
          tension: 0.35,
          fill: true,
          order: 1,
        },
        {
          label: 'Predicted',
          data: predPoints,
          borderColor: '#9ca3af',
          backgroundColor: 'transparent',
          borderWidth: 2.6,
          borderDash: [6, 5],
          pointRadius: 0,
          pointHoverRadius: 5,
          pointBackgroundColor: '#fff',
          pointBorderColor: 'transparent',
          tension: 0.35,
          fill: true,
          order: 2,
          _predicted: true,
        }
      ]
    },
    options: {
      parsing: false,
      animation: { duration: 320 },
      layout: { padding: { top: 36 } },
      interaction: { mode: 'nearest', intersect: false, axis: 'x' },
      plugins: {
        capacityGradient: { enabled: true },
        nowLine: { show: showNow, value: nowVal },
        legend:  { display: false },
        tooltip: {
          enabled: false,
          external: makeExternalTooltip('pred-tooltip'),
          displayColors: false,
          filter: (item) => {
            // Drop the synthetic connector point that bridges the actual line
            // into the predicted line (same x/y as the last actual reading) —
            // without this, hovering right at the seam shows "Actual" and
            // "Predicted" twice with an identical, confusing value.
            if (item.datasetIndex !== 1) return true;
            const actualData = item.chart.data.datasets[0].data;
            const lastActual = actualData[actualData.length - 1];
            return !(lastActual && item.raw.x === lastActual.x && item.raw.y === lastActual.y);
          },
          callbacks: {
            title: (items) => items[0].raw.label || '',
            label: (item) => `${item.dataset.label}: ${Math.round(item.raw.y)}%`,
          }
        }
      },
      scales: {
        x: {
          type: 'linear', min: xMin, max: xMax,
          grid: { display: false },
          border: { display: false },
          ticks: {
            color: '#5a5550',
            font: { size: 11, family: "'Inter', sans-serif", weight: '500' },
            stepSize: 2,
            padding: 8,
            callback: (v) => Number.isInteger(v) ? formatHour(v) : ''
          }
        },
        y: {
          min: 0, max: 110,
          grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
          border: { display: false },
          ticks: {
            color: '#5a5550',
            font: { size: 10, family: "'Inter', sans-serif", weight: '500' },
            stepSize: 25,
            padding: 8,
            callback: (v) => v > 0 ? `${v}%` : ''
          }
        }
      }
    }
  });
}

// ── Insight Cards ─────────────────────────────────────────────
function getBlendedSlots(data, fromH, toH, date) {
  const dateStr = date || todayPT();
  const isToday = dateStr === todayPT();
  const simMap = {};
  if (isToday && data.today_similarity_preds) {
    data.today_similarity_preds.forEach(p => { simMap[p.x] = p; });
  }
  const slots = [];
  for (let h = Math.floor(fromH); h <= Math.floor(toH); h++) {
    for (const m of [0, 15, 30, 45]) {
      const slotH = h + m / 60;
      if (slotH < fromH || slotH >= toH) continue;
      const key  = `${dateStr}_${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const pred = data.predictions[key];
      if (pred == null) continue;
      const sim     = simMap[slotH];
      const w       = sim ? (sim.w != null ? sim.w : (data.today_blend_weight || 0)) : 0;
      const blended = sim ? (1 - w) * pred + w * sim.y : pred;
      slots.push({ h, m, slotH, y: blended });
    }
  }
  return slots;
}

function computeTrend(data, livePct) {
  const isToday = predDate === todayPT();
  const d = new Date(predDate + 'T12:00:00');
  const { open, close } = getOpenHours(d.getDay(), d);

  let fromH, toH, sub;
  if (isToday) {
    const pt  = getPTNow();
    const nowH = pt.getHours() + pt.getMinutes() / 60;
    if (close - nowH < 0.5) return null;
    fromH = nowH;
    toH   = Math.min(nowH + 0.5, close);
    sub   = null;
  } else {
    fromH = open;
    toH   = Math.min(open + 0.5, close);
    sub   = 'first 30 min · projected';
  }

  const slots = getBlendedSlots(data, fromH, toH, predDate);
  if (slots.length < 2) return null;

  const startY = (isToday && livePct != null) ? livePct : slots[0].y;
  const endY   = slots[slots.length - 1].y;
  const delta  = endY - startY;

  const dir = Math.abs(delta) < 5 ? 'flat' : delta > 0 ? 'up' : 'down';
  const lastSlot = slots[slots.length - 1];
  return { dir, delta: Math.round(delta), startY: Math.round(startY), endY: Math.round(endY), toH: lastSlot.h, toMin: lastSlot.m, sub };
}

function computeDayComparisonAt(dayName, qH, data, forDate) {
  function getWeeklyAt(key, h) {
    const arr = data.weekly[key];
    if (!arr) return null;
    const pt = arr.find(p => p.x === h);
    return pt ? pt.y : null;
  }
  // Compare against the same KIND of day: a summer Thursday vs usual summer
  // Thursdays, an in-session one vs usual semester Thursdays, a break day vs
  // usual break days. (The old "This semester only" slice went blank every
  // summer, since there are no in-session days to average.)
  const period    = periodTypeOf(forDate);
  const rangeType = PERIOD_RANGE_TYPE[period];
  const disp      = RANGE_DB_TO_DISPLAY[rangeType] || rangeType;
  return {
    period,
    baseline: getWeeklyAt(`${dayName}|${disp}|false`, qH),
  };
}

function renderInsightCards(data) {
  const row = document.getElementById('insight-row');
  row.classList.remove('hidden');

  const isToday   = predDate === todayPT();
  const pt        = getPTNow();
  const predDay   = new Date(predDate + 'T12:00:00');
  const dayName   = DAYS[predDay.getDay()];
  const livePct   = liveCapacity ? liveCapacity.pct : null;
  const liveCount = liveCapacity ? liveCapacity.count : null;

  const { open: openH, close: closeH } = getOpenHours(predDay.getDay(), predDay);

  // ── Card 1: Status / Capacity ──
  const statusLabel = document.getElementById('insight-status-label');
  const pctEl       = document.getElementById('insight-pct');
  const pctTagEl    = document.getElementById('insight-pct-tag');
  const capFill     = document.getElementById('insight-cap-fill');
  const capLabel    = document.getElementById('insight-cap-label');
  pctTagEl.textContent = '';

  if (isToday) {
    const gymIsOpen = pt.getHours() >= openH && pt.getHours() < closeH;
    statusLabel.textContent = 'LIVE CAPACITY';

    if (gymIsOpen && livePct != null) {
      pctEl.textContent = `${livePct.toFixed(0)}%`;
      pctEl.style.color = pctColor(livePct);

      const fillCls = livePct >= 90 ? 'critical' : livePct >= 80 ? 'high' : livePct >= 60 ? 'mid' : '';
      capFill.style.width = `${Math.min(livePct, 100)}%`;
      capFill.className = `cap-bar-fill${fillCls ? ' ' + fillCls : ''}`;

      if (livePct >= 95) {
        capLabel.innerHTML = `${liveCount} / 150 people · <a href="https://417804.waitwell.us/join/48" target="_blank" rel="noopener">Join virtual queue</a>`;
      } else {
        capLabel.textContent = `${liveCount} / 150 people`;
      }
    } else if (gymIsOpen) {
      pctEl.textContent = '—';
      pctEl.style.color = 'var(--sub)';
      capFill.style.width = '0%';
      capLabel.textContent = 'Live count unavailable';
    } else {
      const nowH = pt.getHours() + pt.getMinutes() / 60;
      const isBeforeOpen = nowH < openH;
      const tomorrow = new Date(pt.getTime() + 24 * 60 * 60 * 1000);
      const nextOpen = isBeforeOpen ? openH : getOpenHours(tomorrow.getDay(), tomorrow).open;
      const prefix   = isBeforeOpen ? 'Opens at' : 'Opens tomorrow at';

      pctEl.textContent = 'CLOSED';
      pctEl.style.color = '#f87171';
      pctEl.style.fontSize = '';
      capFill.style.width = '0%';
      capLabel.textContent = `${prefix} ${formatTime(nextOpen, 0)}`;
    }
  } else {
    statusLabel.textContent = 'DAILY FORECAST';
    const allSlots = getBlendedSlots(data, openH, closeH, predDate);
    if (allSlots.length) {
      const peak = allSlots.reduce((a, b) => b.y > a.y ? b : a);
      pctEl.textContent = `${Math.round(peak.y)}%`;
      pctEl.style.color = pctColor(peak.y);
      pctTagEl.textContent = 'PEAK';
      const fillCls = peak.y >= 90 ? 'critical' : peak.y >= 80 ? 'high' : peak.y >= 60 ? 'mid' : '';
      capFill.style.width = `${Math.min(peak.y, 100)}%`;
      capFill.className = `cap-bar-fill${fillCls ? ' ' + fillCls : ''}`;
      capLabel.textContent = `${formatTime(openH, 0)} – ${formatTime(closeH, 0)}`;
    } else {
      pctEl.textContent = '—';
      pctEl.style.color = 'var(--sub)';
      capFill.style.width = '0%';
      capLabel.textContent = '—';
    }
  }

  // ── Card 2: Trend (Next 30 min) ──
  const trendValEl = document.getElementById('insight-trend-val');
  const trendSubEl = document.getElementById('insight-trend-sub');
  const trend = computeTrend(data, livePct);

  if (trend && isToday) {
    const labels  = { up: 'Getting busier', down: 'Getting quieter', flat: 'Holding steady' };
    const dirColor = trend.dir === 'up' ? '#f87171' : trend.dir === 'down' ? '#6ee7b7' : 'var(--text)';
    trendValEl.textContent = labels[trend.dir];
    trendValEl.style.color = dirColor;

    const arrows = { up: '↑', down: '↓', flat: '→' };
    const subColor = trend.dir === 'up' ? '#f87171' : trend.dir === 'down' ? '#6ee7b7' : 'var(--sub)';
    const sign = trend.delta >= 0 ? '+' : '';
    trendSubEl.innerHTML = `<span style="color:${subColor}">${arrows[trend.dir]} ${sign}${trend.delta}%</span>`;
  } else {
    trendValEl.textContent = '—';
    trendValEl.style.color = 'var(--sub)';
    trendSubEl.textContent = '';
  }

  // ── Card 3: Comparison (vs usual day of this same period type) ──
  const compHeaderEl  = document.getElementById('insight-comp-header');
  const compVerdictEl = document.getElementById('insight-comp-verdict');
  const compDeltaEl   = document.getElementById('insight-comp-delta');

  compHeaderEl.textContent = `COMPARED TO USUAL ${dayName.toUpperCase()}S`;

  const cmpH = isToday
    ? Math.round((pt.getHours() + pt.getMinutes() / 60) * 4) / 4
    : 12;
  const cmp = computeDayComparisonAt(dayName, cmpH, data, new Date(predDate + 'T12:00:00'));
  const refPct = isToday ? livePct : null;
  const baseline = cmp.baseline;
  const avgDelta = (baseline != null && refPct != null) ? Math.round(refPct - baseline) : null;

  if (avgDelta != null) {
    const absDelta = Math.abs(avgDelta);
    const higher = avgDelta > 0;

    let verdict, verdictClass;
    if (absDelta > 15) {
      verdict = higher ? 'Much Busier' : 'Much Quieter';
      verdictClass = higher ? 'much-busier' : 'much-quieter';
    } else if (absDelta > 6) {
      verdict = higher ? 'Busier' : 'Quieter';
      verdictClass = higher ? 'busier' : 'quieter';
    } else if (absDelta > 3) {
      verdict = higher ? 'A Bit Busier' : 'A Bit Quieter';
      verdictClass = higher ? 'bit-busier' : 'bit-quieter';
    } else {
      verdict = 'Average';
      verdictClass = 'average';
    }

    compVerdictEl.textContent = verdict;
    compVerdictEl.className = `card-value comp-verdict ${verdictClass}`;
    compDeltaEl.innerHTML = `<span class="comp-verdict ${verdictClass}">${absDelta}% ${higher ? 'higher' : 'lower'}</span>`;
  } else {
    compVerdictEl.textContent = '—';
    compVerdictEl.className = 'card-value comp-verdict';
    compVerdictEl.style.color = 'var(--sub)';
    compDeltaEl.textContent = '';
  }
}

// ── Boot ───────────────────────────────────────────────────────
async function init() {
  // chart.js loads with `defer`, so it isn't available until DOMContentLoaded
  // (which gates this init call). Register plugins here, not at parse time.
  Chart.register(capacityGradientPlugin, nowLinePlugin, scrubLinePlugin);
  updateStatusBar();
  // Live capacity is server-cached for 30s (see api/live-capacity.js), so
  // polling any faster than that just re-fetches the same cached value.
  setInterval(updateStatusBar, 30000);

  const today     = todayPT();
  const yesterday = shiftDate(today, -1);

  let predRows, actualsRows, todaySummaryRows;
  try {
    [predRows, actualsRows, todaySummaryRows] = await Promise.all([
      // First paint only needs the visible pills (today .. today+4). The rest
      // of the 90-day horizon (calendar "More" days) loads in the background
      // below so it can't slow the initial render.
      sbFetch(`predictions?select=slot_ts,pct&slot_ts=gte.${today}T00:00:00&slot_ts=lte.${shiftDate(today, 4)}T23:59:59&order=slot_ts.asc&limit=10000`),
      sbFetch(`capacity_log?timestamp=gte.${yesterday}T12:00:00Z&order=timestamp.asc&limit=2000`),
      sbFetch(`today_summary?date=eq.${today}&select=similarity_preds,blend_weight,computed_at`),
    ]);
  } catch (e) {
    console.error('Supabase load failed:', e);
    document.body.classList.remove('loading');
    showDataWarning(`Could not load gym data: ${e.message}`);
    return;
  }

  // Only feeds the small "compared to usual X" card, not the main charts --
  // fetched outside the Promise.all above so a slow/failed weekly_averages
  // query (see migrations/004_weekly_averages_perf_fix.sql) can't block the
  // rest of the page.
  let weeklyRows = [];
  try {
    weeklyRows = await sbFetch(`weekly_averages?select=*&limit=10000`);
  } catch (e) {
    console.error('weekly_averages load failed (comparison card will show "—"):', e);
  }

  const predictions = {};
  predRows.forEach(r => { predictions[slotTsToKey(r.slot_ts)] = r.pct; });

  const weekly = {};
  weeklyRows.forEach(r => {
    const disp = RANGE_DB_TO_DISPLAY[r.range_type] || r.range_type;
    const key  = `${r.day_of_week}|${disp}|${r.semester_only}`;
    if (!weekly[key]) weekly[key] = [];
    weekly[key].push({ x: r.hour_slot, y: r.avg_pct, label: slotToLabel(r.hour_slot) });
  });
  Object.values(weekly).forEach(arr => arr.sort((a, b) => a.x - b.x));

  const ts = todaySummaryRows[0] || {};
  const built_at = ts.computed_at
    ? new Date(ts.computed_at).toLocaleString('en-US', { timeZone: 'America/Los_Angeles',
        month: 'numeric', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) + ' PT'
    : today;

  const data = {
    predictions,
    weekly,
    today_actuals:           buildTodayActuals(actualsRows, today),
    today_similarity_preds:  ts.similarity_preds || [],
    today_blend_weight:      ts.blend_weight || 0,
    built_at,
  };

  if (Object.keys(predictions).length === 0) {
    showDataWarning('Prediction data is unavailable — the daily build may not have run yet.');
  }

  predDate = today;

  window._insightData = data;

  // Render day pills
  renderPills(data);

  // Calendar popup
  const calPopup = document.getElementById('cal-popup');
  const minDate  = today;
  const maxDate  = shiftDate(today, 90);
  let calYear, calMonth;

  function renderCalendar() {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const prevMonthHasDays = new Date(calYear, calMonth - 1, 28) >= new Date(minDate + 'T00:00:00');
    const nextMonthHasDays = new Date(calYear, calMonth + 1, 1) <= new Date(maxDate + 'T00:00:00');

    let html = `<div class="cal-header">
      <button class="cal-nav-btn" id="cal-prev-month" ${!prevMonthHasDays ? 'disabled' : ''}>←</button>
      <span class="cal-month-label">${months[calMonth]} ${calYear}</span>
      <button class="cal-nav-btn" id="cal-next-month" ${!nextMonthHasDays ? 'disabled' : ''}>→</button>
    </div>
    <div class="cal-grid">`;
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => html += `<div class="cal-dow">${d}</div>`);
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-day cal-day-empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const disabled = ds < minDate || ds > maxDate;
      const selected = ds === predDate;
      const isToday  = ds === today;
      const cls = ['cal-day', disabled ? 'cal-day-disabled' : '', selected ? 'cal-day-selected' : '', isToday ? 'cal-day-today' : ''].filter(Boolean).join(' ');
      html += `<div class="${cls}" data-date="${ds}">${d}</div>`;
    }
    html += '</div>';
    calPopup.innerHTML = html;

    document.getElementById('cal-prev-month').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
    document.getElementById('cal-next-month').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });
    calPopup.querySelectorAll('.cal-day:not(.cal-day-disabled):not(.cal-day-empty)').forEach(el => {
      el.addEventListener('click', () => {
        predDate = el.dataset.date;
        calPopup.style.display = 'none';
        updatePredChart(data);
        renderInsightCards(data);
        updatePillStates();
      });
    });
  }

  document.getElementById('day-pills').addEventListener('click', (e) => {
    const calTrigger = e.target.closest('#cal-trigger');
    if (!calTrigger) return;
    e.stopPropagation();
    if (calPopup.style.display !== 'none') { calPopup.style.display = 'none'; return; }
    const d = new Date(predDate + 'T12:00:00');
    calYear = d.getFullYear(); calMonth = d.getMonth();
    renderCalendar();
    const pillsEl = document.getElementById('day-pills');
    const rect = pillsEl.getBoundingClientRect();
    const sectionRect = document.getElementById('section-predict').getBoundingClientRect();
    calPopup.style.top  = (rect.bottom - sectionRect.top + 8) + 'px';
    calPopup.style.right = '0';
    calPopup.style.left = 'auto';
    calPopup.style.display = 'block';
  });

  document.addEventListener('click', () => { calPopup.style.display = 'none'; });
  calPopup.addEventListener('click', e => e.stopPropagation());

  updatePredChart(data);
  renderInsightCards(data);

  document.getElementById('footer-built').textContent = `UPDATED ${data.built_at}`;
  document.body.classList.remove('loading');

  // Background-load the rest of the 90-day horizon (calendar "More" days) after
  // first paint. Merges into the same `predictions` object the rendered view
  // already references, then re-renders so a day the user may have navigated to
  // via the calendar fills in automatically once it arrives.
  sbFetch(`predictions?select=slot_ts,pct&slot_ts=gte.${shiftDate(today, 5)}T00:00:00&slot_ts=lte.${shiftDate(today, 92)}T23:59:59&order=slot_ts.asc&limit=10000`)
    .then(rows => {
      rows.forEach(r => { predictions[slotTsToKey(r.slot_ts)] = r.pct; });
      updatePredChart(data);
      renderInsightCards(data);
    })
    .catch(e => console.error('background predictions load failed:', e));
}

// chart.js is loaded with `defer`, which executes before DOMContentLoaded but
// after this inline script parses. Gating init on DOMContentLoaded guarantees
// the Chart global exists before updatePredChart runs.
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
