<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berkeley RSF Weight Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #09090f;
      --panel:      #0d0e16;
      --panel2:     #12131e;
      --border:     rgba(160, 170, 220, 0.1);
      --border2:    rgba(160, 170, 220, 0.16);
      --accent:     #93a4f5;
      --accent-bg:  rgba(147, 164, 245, 0.08);
      --text:       #e2e3ee;
      --sub:        #8f92aa;
      --muted:      #454660;
      --open-color: #6ee7b7;
      --closed-color: #f87171;
      --font:  'Inter', -apple-system, sans-serif;
      --mono:  'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Data Warning ── */
    #data-warning {
      display: none;
      text-align: center;
      padding: 10px 24px;
      font-size: 11px;
      letter-spacing: 0.05em;
      font-family: var(--mono);
      background: rgba(248, 113, 113, 0.07);
      border-bottom: 1px solid rgba(248, 113, 113, 0.15);
      color: #f87171;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 88px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Status pill */
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 40px;
      padding: 0 20px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      transition: border-color 0.4s, background 0.4s;
    }
    .status-badge.open {
      border-color: rgba(110, 231, 183, 0.28);
      background: rgba(110, 231, 183, 0.05);
    }
    .status-badge.closed {
      border-color: rgba(248, 113, 113, 0.22);
      background: rgba(248, 113, 113, 0.05);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-badge.open .status-dot {
      background: var(--open-color);
      animation: live-pulse 2.8s ease-in-out infinite;
    }
    .status-badge.closed .status-dot {
      background: var(--closed-color);
    }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .status-label {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      transition: color 0.3s;
      line-height: 40px;
      display: block;
    }
    .status-badge.open   .status-label { color: var(--open-color); }
    .status-badge.closed .status-label { color: var(--closed-color); }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: column;
    }

    .section-pred {
      padding: 52px 48px 56px;
      border-bottom: 1px solid var(--border);
    }

    .section-weekly {
      padding: 52px 48px 60px;
    }

    /* Prediction date nav */
    .pred-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .pred-nav-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--sub);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }
    .pred-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .pred-nav-btn:disabled { opacity: 0.25; cursor: default; }

    .pred-date-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      min-width: 180px;
    }

    /* ── Eyebrow + title ── */
    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 32px;
    }

    /* ── Chart card ── */
    .chart-card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 24px 22px;
      overflow: hidden;
    }
    .chart-card canvas { display: block; width: 100% !important; }

    .no-data-overlay {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      text-align: center;
      padding: 24px;
      pointer-events: none;
      line-height: 1.7;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      margin-top: 28px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      position: relative;
    }

    .field label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    select {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border2);
      color: var(--text);
      padding: 6px 0;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      min-width: 120px;
      transition: border-color 0.15s;
    }
    select:focus { border-bottom-color: var(--accent); }
    select option { background: #1c1d2e; color: var(--text); }
    input[type="hidden"] { display: none; }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }
    .check-row label {
      font-size: 12px;
      color: var(--sub);
      cursor: pointer;
    }
    .check-row .hint {
      font-size: 11px;
      color: var(--muted);
    }
    input[type="checkbox"] {
      accent-color: var(--accent);
      width: 13px;
      height: 13px;
      cursor: pointer;
    }

    .chart-caption {
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }


    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      border-top: 1px solid var(--border);
    }

    .footer-r {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div id="data-warning"></div>

<header>
  <div style="display:flex; align-items:center; gap:28px;">
    <div class="logo">RSF Crowd Level Predictor</div>
    <div class="status-badge" id="status-badge" style="display:inline-flex;">
      <span class="status-label" id="status-text">—</span>
      <span class="status-label" id="live-count" style="margin-left:4px;"></span>
    </div>
  </div>
  <div class="header-right">
  </div>
</header>

<main>

  <!-- PREDICTION CHART: full-width -->
  <div class="section-pred" id="section-predict">
    <div class="section-title">Predicted Occupancy</div>

    <div class="pred-nav">
      <button class="pred-nav-btn" id="pred-prev">&#8592;</button>
      <span class="pred-date-label" id="pred-date-label">—</span>
      <button class="pred-nav-btn" id="pred-next">&#8594;</button>
    </div>

    <div class="chart-card">
      <canvas id="pred-chart" height="290"></canvas>
    </div>
    <div class="chart-caption" id="pred-caption"></div>
  </div>

  <!-- WEEKLY PATTERNS: full-width -->
  <div class="section-weekly" id="section-weekly">
    <div class="section-title">Weekly Patterns</div>

    <div class="chart-card">
      <canvas id="weekly-chart" height="290"></canvas>
      <div id="weekly-no-data" class="no-data-overlay">
        No data for this combination —<br>try a wider range or uncheck Semester only.
      </div>
    </div>

    <div class="controls">
      <div class="field">
        <label>DAY</label>
        <select id="day-select">
          <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
          <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
        </select>
      </div>
      <div class="field">
        <label>DATE RANGE</label>
        <select id="range-select">
          <option>Last week</option><option>Last month</option>
          <option>Last 6 months</option><option>Last year</option><option>All time</option>
        </select>
      </div>
    </div>
    <div class="check-row">
      <input type="checkbox" id="semester-check" checked>
      <label for="semester-check">Semester only</label>
      <span class="hint">— excludes breaks</span>
    </div>
    <div class="chart-caption" id="weekly-meta"></div>
  </div>

</main>

<footer>
  <div class="footer-r" id="footer-built"></div>
</footer>

<script>
const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function getPTNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
}

function getOpenHours(jsDay) {
  if (jsDay === 6) return { open: 8, close: 18 };
  if (jsDay === 0) return { open: 8, close: 23 };
  return { open: 7, close: 23 };
}

function formatHour(h) {
  if (h === 0 || h === 24) return '12 AM';
  if (h === 12) return '12 PM';
  return h > 12 ? `${h - 12} PM` : `${h} AM`;
}

function formatTime(h, m) {
  const period = h >= 12 ? 'PM' : 'AM';
  const dh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return m === 0 ? `${dh}:00 ${period}` : `${dh}:${String(m).padStart(2, '0')} ${period}`;
}

function todayPT() {
  const pt = getPTNow();
  return `${pt.getFullYear()}-${String(pt.getMonth()+1).padStart(2,'0')}-${String(pt.getDate()).padStart(2,'0')}`;
}

// ── Status ─────────────────────────────────────────────────────
function updateStatusBar() {
  const pt = getPTNow();
  const { open, close } = getOpenHours(pt.getDay());
  const isOpen = pt.getHours() >= open && pt.getHours() < close;
  const badge = document.getElementById('status-badge');
  const label = document.getElementById('status-text');
  const liveCount = document.getElementById('live-count');
  badge.className = `status-badge ${isOpen ? 'open' : 'closed'}`;
  label.textContent = isOpen ? 'OPEN' : 'CLOSED';

  if (isOpen) {
    liveCount.style.display = '';
    fetch('https://api.density.io/v2/spaces/spc_863128347956216317/count', {
      headers: { 'Authorization': 'Bearer shr_o69HxjQ0BYrY2FPD9HxdirhJYcFDCeRolEd744Uj88e' }
    })
      .then(r => r.json())
      .then(d => {
        const pct = Math.round((d.count / 150) * 100);
        liveCount.textContent = `· ${d.count} people (${pct}%)`;
      })
      .catch(() => {});
  } else {
    liveCount.textContent = '';
    liveCount.style.display = 'none';
  }
}

// ── Prediction Chart ───────────────────────────────────────────
let predChart = null;
let predDate  = '';

function shiftDate(dateStr, delta) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatPredLabel(dateStr) {
  const today = todayPT();
  if (dateStr === today) return 'Today';
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${DAYS[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}

function buildPredPoints(data, dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const { open, close } = getOpenHours(d.getDay());
  const points = [];
  for (let h = open; h < close; h++) {
    for (const m of [0, 15, 30, 45]) {
      const key = `${dateStr}_${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const pred = data.predictions[key];
      if (!pred) continue;
      points.push({ x: h + m / 60, y: Math.round((pred[0] + pred[1]) / 2 * 10) / 10, label: formatTime(h, m) });
    }
  }
  // closing zero
  points.push({ x: close, y: 0, label: formatTime(close, 0) });
  return points;
}

// Custom plugin: draws a vertical "Now" line
const nowLinePlugin = {
  id: 'nowLine',
  afterDatasetsDraw(chart) {
    const opts = chart.options.plugins.nowLine;
    if (!opts?.show || opts.value == null) return;
    const { ctx, chartArea, scales } = chart;
    const x = scales.x.getPixelForValue(opts.value);
    if (x < chartArea.left || x > chartArea.right) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(147, 164, 245, 0.55)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(x, chartArea.top);
    ctx.lineTo(x, chartArea.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(147, 164, 245, 0.65)';
    ctx.font = `500 10px 'Inter', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Now', x, chartArea.top - 6);
    ctx.restore();
  }
};
Chart.register(nowLinePlugin);

function updatePredChart(data) {
  const today    = todayPT();
  const isToday  = predDate === today;
  const pt       = getPTNow();
  const nowVal   = pt.getHours() + pt.getMinutes() / 60;

  const allPredPoints = buildPredPoints(data, predDate);
  // On today: clip actual to <= now, clip predicted to >= now
  const actualPoints = isToday
    ? (data.today_actuals || []).filter(p => p.x <= nowVal)
    : [];
  let predPoints = isToday
    ? allPredPoints.filter(p => p.x >= nowVal)
    : allPredPoints;

  // Blend base ML with similarity signal for today's remaining predictions
  if (isToday && data.today_blend_weight > 0 && data.today_similarity_preds?.length) {
    const w      = data.today_blend_weight;
    const simMap = {};
    data.today_similarity_preds.forEach(p => { simMap[p.x] = p.y; });
    predPoints = predPoints.map(p => {
      const simY = simMap[p.x];
      if (simY == null) return p;
      return { ...p, y: Math.round(((1 - w) * p.y + w * simY) * 10) / 10 };
    });
  }

  // Nav buttons
  const minDate = today;
  const maxDate = shiftDate(today, 179);
  document.getElementById('pred-prev').disabled = predDate <= minDate;
  document.getElementById('pred-next').disabled = predDate >= maxDate;
  document.getElementById('pred-date-label').textContent = formatPredLabel(predDate);

  // Closed zones for selected day
  const d = new Date(predDate + 'T12:00:00');
  const closedRanges = getClosedRanges(DAYS[d.getDay()]);

  // Caption
  const avgErr = ((data.metrics.rf_mae + data.metrics.mlp_mae) / 2).toFixed(1);
  document.getElementById('pred-caption').textContent = `Avg model error ±${avgErr}%`;

  if (predChart) {
    predChart.data.datasets[0].data = actualPoints;
    predChart.data.datasets[1].data = predPoints;
    predChart.options.plugins.nowLine.show  = isToday;
    predChart.options.plugins.nowLine.value = nowVal;
    predChart.options.plugins.closedZone.ranges = closedRanges;
    predChart.update();
    return;
  }

  const ctx = document.getElementById('pred-chart').getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 290);
  gradient.addColorStop(0, 'rgba(147, 164, 245, 0.2)');
  gradient.addColorStop(1, 'rgba(147, 164, 245, 0)');

  predChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Actual',
          data: actualPoints,
          borderColor: '#93a4f5',
          backgroundColor: gradient,
          borderWidth: 1.5,
          pointRadius: 4,
          pointHoverRadius: 6,
          pointBackgroundColor: '#93a4f5',
          pointBorderColor: 'transparent',
          tension: 0.35,
          fill: true,
          order: 1,
        },
        {
          label: 'Predicted',
          data: predPoints,
          borderColor: '#9ca3af',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 4],
          pointRadius: 3,
          pointHoverRadius: 5,
          pointBackgroundColor: '#9ca3af',
          pointBorderColor: 'transparent',
          tension: 0.35,
          fill: false,
          order: 2,
        }
      ]
    },
    options: {
      parsing: false,
      animation: { duration: 320 },
      plugins: {
        nowLine:    { show: isToday, value: nowVal },
        closedZone: { ranges: closedRanges },
        legend:     { display: false },
        tooltip: {
          backgroundColor: '#1a1b2e',
          titleColor: '#8f92aa',
          bodyColor: '#e2e3ee',
          borderColor: 'rgba(147,164,245,0.18)',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            title: (items) => items[0].raw.label || '',
            label: (item) => ` ${item.dataset.label}: ${item.raw.y.toFixed(1)}%`,
          }
        }
      },
      scales: {
        x: {
          type: 'linear', min: 7, max: 23,
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { display: false },
          ticks: {
            color: '#8f92aa',
            font: { size: 11, family: "'Inter', -apple-system, sans-serif", weight: '500' },
            stepSize: 1,
            callback: (v) => Number.isInteger(v) ? formatHour(v) : ''
          }
        },
        y: {
          min: 0, max: 110,
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { display: false },
          ticks: {
            color: '#8f92aa',
            font: { size: 11, family: "'Inter', -apple-system, sans-serif", weight: '500' },
            callback: (v) => `${v}%`
          }
        }
      }
    }
  });
}

// ── Weekly Chart ───────────────────────────────────────────────
let weeklyChart = null;

// Returns closed hour ranges within the 8–23 window for a given day name
function getClosedRanges(dayName) {
  const jsDay = DAYS.indexOf(dayName);
  const { open, close } = getOpenHours(jsDay);
  const ranges = [];
  if (open > 7)  ranges.push([7, open]);
  if (close < 23) ranges.push([close, 23]);
  return ranges;
}

// Custom plugin: draws red transparent zones for closed hours
const closedZonePlugin = {
  id: 'closedZone',
  beforeDatasetsDraw(chart) {
    const ranges = chart.options.plugins.closedZone?.ranges;
    if (!ranges || ranges.length === 0) return;
    const { ctx, chartArea, scales } = chart;
    ctx.save();
    ctx.fillStyle = 'rgba(248, 113, 113, 0.10)';
    for (const [from, to] of ranges) {
      const x1 = Math.max(scales.x.getPixelForValue(from), chartArea.left);
      const x2 = Math.min(scales.x.getPixelForValue(to), chartArea.right);
      if (x2 > x1) ctx.fillRect(x1, chartArea.top, x2 - x1, chartArea.height);
    }
    // Draw a subtle red top border on each zone
    ctx.strokeStyle = 'rgba(248, 113, 113, 0.22)';
    ctx.lineWidth = 1;
    for (const [from, to] of ranges) {
      const x1 = Math.max(scales.x.getPixelForValue(from), chartArea.left);
      const x2 = Math.min(scales.x.getPixelForValue(to), chartArea.right);
      if (x2 > x1) {
        ctx.beginPath();
        ctx.moveTo(x1, chartArea.top);
        ctx.lineTo(x1, chartArea.bottom);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
};
Chart.register(closedZonePlugin);

function updateWeeklyChart(data) {
  const day      = document.getElementById('day-select').value;
  const range    = document.getElementById('range-select').value;
  const semester = document.getElementById('semester-check').checked;
  const raw      = data.weekly[`${day}|${range}|${semester}`] || [];
  const hasData  = raw.some(p => p.y > 0);
  const points   = hasData ? raw : [];

  document.getElementById('weekly-no-data').style.display = hasData ? 'none' : 'flex';

  const semStr = semester ? ', semester weeks' : '';
  document.getElementById('weekly-meta').textContent = `${day}s · ${range}${semStr}`;

  const closedRanges = getClosedRanges(day);

  if (weeklyChart) {
    weeklyChart.data.datasets[0].data = points;
    weeklyChart.options.plugins.closedZone.ranges = closedRanges;
    weeklyChart.update();
    return;
  }

  const ctx = document.getElementById('weekly-chart').getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 290);
  gradient.addColorStop(0, 'rgba(147, 164, 245, 0.2)');
  gradient.addColorStop(1, 'rgba(147, 164, 245, 0)');

  weeklyChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        data: points,
        borderColor: '#93a4f5',
        backgroundColor: gradient,
        borderWidth: 1.5,
        pointRadius: 4,
        pointHoverRadius: 6,
        pointBackgroundColor: '#93a4f5',
        pointBorderColor: 'transparent',
        tension: 0.35,
        fill: true,
      }]
    },
    options: {
      parsing: false,
      animation: { duration: 320 },
      plugins: {
        closedZone: { ranges: closedRanges },
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1b2e',
          titleColor: '#8f92aa',
          bodyColor: '#e2e3ee',
          borderColor: 'rgba(147,164,245,0.18)',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            title: (items) => items[0].raw.label || '',
            label: (item) => ` ${item.raw.y.toFixed(1)}% capacity`,
          }
        }
      },
      scales: {
        x: {
          type: 'linear', min: 7, max: 23,
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { display: false },
          ticks: {
            color: '#8f92aa',
            font: { size: 11, family: "'Inter', -apple-system, sans-serif", weight: '500' },
            stepSize: 1,
            callback: (v) => Number.isInteger(v) ? formatHour(v) : ''
          }
        },
        y: {
          min: 0, max: 110,
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { display: false },
          ticks: {
            color: '#8f92aa',
            font: { size: 11, family: "'Inter', -apple-system, sans-serif", weight: '500' },
            callback: (v) => `${v}%`
          }
        }
      }
    }
  });
}

// ── Data Warning ───────────────────────────────────────────────
function showDataWarning(msg) {
  const el = document.getElementById('data-warning');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Boot ───────────────────────────────────────────────────────
async function init() {
  updateStatusBar();

  let data;
  try {
    const res = await fetch('data.json');
    data = await res.json();
  } catch (e) {
    showDataWarning('⚠  Could not load gym data. The data file may be missing or the last scrape failed. Please check back later.');
    return;
  }

  const predCount = Object.keys(data.predictions || {}).length;
  if (predCount === 0) {
    showDataWarning('⚠  Prediction data is unavailable — the last data collection may have failed or is still in progress.');
  } else {
    const builtAt = data.built_at ? new Date(data.built_at.replace(' PT', '')) : null;
    if (builtAt && (Date.now() - builtAt.getTime()) / 3600000 > 48) {
      showDataWarning(`⚠  Data may be outdated — last updated ${data.built_at}.`);
    }
  }

  const today = todayPT();
  const pt = getPTNow();
  predDate = today;
  document.getElementById('day-select').value = DAYS[pt.getDay()];

  document.getElementById('pred-prev').addEventListener('click', () => {
    predDate = shiftDate(predDate, -1);
    updatePredChart(data);
  });
  document.getElementById('pred-next').addEventListener('click', () => {
    predDate = shiftDate(predDate, 1);
    updatePredChart(data);
  });

  document.getElementById('day-select').addEventListener('change', () => updateWeeklyChart(data));
  document.getElementById('range-select').addEventListener('change', () => updateWeeklyChart(data));
  document.getElementById('semester-check').addEventListener('change', () => updateWeeklyChart(data));

  updatePredChart(data);
  updateWeeklyChart(data);

  document.getElementById('footer-built').textContent = `UPDATED ${data.built_at}`;
}

init();

</script>
</body>
</html>
