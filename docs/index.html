<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berkeley RSF Weight Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #09090f;
      --panel:      #0d0e16;
      --panel2:     #12131e;
      --border:     rgba(160, 170, 220, 0.1);
      --border2:    rgba(160, 170, 220, 0.16);
      --accent:     #93a4f5;
      --accent-bg:  rgba(147, 164, 245, 0.08);
      --text:       #e2e3ee;
      --sub:        #8f92aa;
      --muted:      #454660;
      --open-color: #6ee7b7;
      --closed-color: #f87171;
      --font:  'Inter', -apple-system, sans-serif;
      --mono:  'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Data Warning ── */
    #data-warning {
      display: none;
      text-align: center;
      padding: 10px 24px;
      font-size: 11px;
      letter-spacing: 0.05em;
      font-family: var(--mono);
      background: rgba(248, 113, 113, 0.07);
      border-bottom: 1px solid rgba(248, 113, 113, 0.15);
      color: #f87171;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 88px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Status pill */
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 40px;
      padding: 0 20px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      transition: border-color 0.4s, background 0.4s;
    }
    .status-badge.open {
      border-color: rgba(110, 231, 183, 0.28);
      background: rgba(110, 231, 183, 0.05);
    }
    .status-badge.closed {
      border-color: rgba(248, 113, 113, 0.22);
      background: rgba(248, 113, 113, 0.05);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-badge.open .status-dot {
      background: var(--open-color);
      animation: live-pulse 2.8s ease-in-out infinite;
    }
    .status-badge.closed .status-dot {
      background: var(--closed-color);
    }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .status-label {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      transition: color 0.3s;
      line-height: 40px;
      display: block;
    }
    .status-badge.open   .status-label { color: var(--open-color); }
    .status-badge.closed .status-label { color: var(--closed-color); }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: column;
    }

    .section-pred {
      position: relative;
      padding: 32px 48px 0;
    }

    .section-weekly {
      padding: 50px 48px 60px;
    }
    .section-weekly .section-title {
      margin-bottom: 38px;
    }

    /* Calendar popup */
    .cal-popup {
      position: absolute;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 16px;
      z-index: 100;
      width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-month-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .cal-nav-btn {
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      font-size: 15px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .cal-nav-btn:hover { color: var(--text); }
    .cal-nav-btn:disabled { opacity: 0.2; cursor: default; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-dow {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 4px 0;
      font-weight: 600;
    }
    .cal-day {
      text-align: center;
      padding: 6px 2px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--sub);
      transition: background 0.12s, color 0.12s;
    }
    .cal-day:hover:not(.cal-day-disabled):not(.cal-day-selected) { background: var(--border2); color: var(--text); }
    .cal-day-disabled { opacity: 0.2; cursor: default; pointer-events: none; }
    .cal-day-selected { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-day-today { color: var(--accent); font-weight: 700; }
    .cal-day-selected.cal-day-today { color: #fff; }
    .cal-day-empty { pointer-events: none; }
    /* Prediction date nav */
    .pred-header-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 32px;
      margin-bottom: 20px;
    }
    .pred-nav {
      display: flex;
      align-items: center;
      gap: 0;
      width: 280px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 8px;
      overflow: hidden;
    }

    .pred-nav-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      width: 44px;
      height: 38px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .pred-nav-btn:hover:not(:disabled) { background: var(--border2); color: var(--accent); }
    .pred-nav-btn:disabled { opacity: 0.25; cursor: default; }
    .pred-date-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      text-align: center;
      border-left: 1px solid var(--border2);
      border-right: 1px solid var(--border2);
      line-height: 38px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    /* ── Eyebrow + title ── */
    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 20px;
    }
    .pred-header-row .section-title { margin-bottom: 0; }

    /* ── Chart card ── */
    .chart-card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 24px 22px;
      overflow: hidden;
    }
    .chart-card canvas { display: block; width: 100% !important; }

    .no-data-overlay {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      text-align: center;
      padding: 24px;
      pointer-events: none;
      line-height: 1.7;
    }

    /* ── Controls ── */
    .weekly-header-row {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 20px;
    }
    .weekly-controls-inline {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
    }
    .weekly-header-row .section-title { margin-bottom: 0; }
    .weekly-header-row .check-row { margin-top: 0; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      margin-top: 28px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      position: relative;
    }

    .field label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    select {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border2);
      color: var(--text);
      padding: 6px 20px 6px 0;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      min-width: 120px;
      transition: border-color 0.15s;
    }
    .field::after {
      content: '▾';
      position: absolute;
      right: 2px;
      bottom: 8px;
      font-size: 11px;
      color: var(--sub);
      pointer-events: none;
      line-height: 1;
    }
    select:focus { border-bottom-color: var(--accent); }
    select option { background: #1c1d2e; color: var(--text); }
    input[type="hidden"] { display: none; }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 0;
    }
    .check-row label {
      font-size: 12px;
      color: var(--sub);
      cursor: pointer;
    }
    .check-row .hint {
      font-size: 11px;
      color: var(--muted);
    }
    input[type="checkbox"] {
      accent-color: var(--accent);
      width: 13px;
      height: 13px;
      cursor: pointer;
    }

    .chart-caption {
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }



    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      border-top: 1px solid var(--border);
    }

    .footer-r {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Insight Cards ── */
    .insight-row {
      display: flex;
      gap: 12px;
      padding: 28px 48px 0;
    }
    .insight-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 29px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 158px;
    }
    #insight-status { flex: 1; justify-content: center; gap: 20px; padding: 40px 30px 28px; }
    .status-row { display: flex; align-items: center; gap: 12px; min-height: 34px; }
    .live-dot {
      position: relative;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-right: -6px;
    }
    .live-dot::before, .live-dot::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .live-dot::before {
      width: 11px; height: 11px;
      background: currentColor;
    }
    .live-dot::after {
      width: 20px; height: 20px;
      background: currentColor;
      opacity: 0.3;
      animation: live-pulse 1.8s ease-out infinite;
    }
    @keyframes live-pulse {
      0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0.4; }
      70%  { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
    }
    .open-pill {
      font-size: 34px;
      font-weight: 700;
      font-family: var(--font);
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .open-pill.open   { color: #6ee7b7; }
    .open-pill.closed { color: #f87171; }
    .status-row { display: flex; align-items: center; gap: 16px; }
    .status-sep { color: var(--muted); font-size: 24px; font-weight: 300; }
    #insight-status-pct { font-size: 34px; font-weight: 700; font-family: var(--font); }
    #insight-comparison { flex: 1; gap: 16px; justify-content: center; padding: 26px 26px; }
    #insight-trend      { flex: 1; gap: 16px; justify-content: center; padding: 26px 30px; }
    .insight-card-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--sub);
      text-transform: uppercase;
    }
    /* Card 2: comparison columns */
    #insight-status-badge { width: fit-content; }
    .comp-verdict {
      font-size: 26px;
      font-weight: 700;
      font-family: var(--font);
      line-height: 1;
    }
    .comp-verdict.much-busier  { color: #dc2626; }
    .comp-verdict.busier       { color: #f87171; }
    .comp-verdict.bit-busier   { color: #fca5a5; }
    .comp-verdict.much-quieter { color: #059669; }
    .comp-verdict.quieter      { color: #6ee7b7; }
    .comp-verdict.bit-quieter  { color: #a7f3d0; }
    .comp-verdict.average      { color: var(--text); }
    .comp-deltas {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .comp-delta-item {
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
    }
    .comp-delta-item span {
      font-weight: 600;
    }
    .comp-delta-item span.much-busier  { color: #dc2626; }
    .comp-delta-item span.busier       { color: #f87171; }
    .comp-delta-item span.bit-busier   { color: #fca5a5; }
    .comp-delta-item span.much-quieter { color: #059669; }
    .comp-delta-item span.quieter      { color: #6ee7b7; }
    .comp-delta-item span.bit-quieter  { color: #a7f3d0; }
    .comp-delta-sep {
      font-size: 11px;
      color: var(--border);
    }
    .comp-header {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--sub);
      text-transform: uppercase;
    }
    /* Card 1: status */
    .cap-bar-wrap { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 6px; }
    .cap-bar-track {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .cap-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: #6ee7b7;
      transition: width 0.6s ease, background 0.4s;
    }
    .cap-bar-fill.mid      { background: #fbbf24; }
    .cap-bar-fill.high     { background: #f87171; }
    .cap-bar-fill.critical { background: #b91c1c; }
    .cap-bar-label {
      font-size: 13px;
      font-family: var(--font);
      color: var(--sub);
    }
    .cap-time {
      font-size: 12px;
      color: var(--muted);
    }
    /* Card 2: trend */
    .trend-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 26px;
    }
    .trend-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .trend-arrow {
      font-size: 26px;
      line-height: 1;
    }
    .trend-arrow.up   { color: #f87171; }
    .trend-arrow.down { color: #6ee7b7; }
    .trend-arrow.flat { color: var(--text); }
    .trend-label {
      font-size: 26px;
      font-weight: 700;
      font-family: var(--font);
      line-height: 1;
      color: var(--text);
    }
    .trend-label.up   { color: #f87171; }
    .trend-label.down { color: #6ee7b7; }
    .trend-delta {
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
    }
    .trend-delta.up   { color: #f87171; }
    .trend-delta.down { color: #6ee7b7; }
    .trend-delta.flat { color: var(--sub); }
    .trend-sub {
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      min-height: 15px;
    }
    /* Card 3: quiet window */
    .quiet-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .quiet-time {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--mono);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .quiet-sub {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .quiet-avg {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--mono);
      color: #6ee7b7;
    }
    .quiet-dur {
      font-size: 12px;
      color: var(--sub);
    }
    .quiet-dash {
      font-size: 22px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1;
    }
    .insight-row.hidden { display: none; }
    @media (max-width: 768px) {
      .insight-row { flex-direction: column; padding: 20px 24px 0; }
    }
  </style>
</head>
<body>

<div id="data-warning"></div>

<header>
  <div style="display:flex; align-items:center;">
    <div class="logo">RSF Crowd Level Predictor</div>
  </div>
  <div class="header-right">
  </div>
</header>

<main>

  <!-- INSIGHT CARDS -->
  <div class="insight-row hidden" id="insight-row">
    <div class="insight-card" id="insight-status">
      <div class="status-row">
        <span class="live-dot" id="insight-live-dot" style="display:none"></span>
        <span class="open-pill" id="insight-open-pill">—</span>
        <span class="status-sep" id="insight-status-sep"></span>
        <span id="insight-status-pct"></span>
      </div>
      <div class="cap-bar-wrap" id="insight-cap-wrap">
        <div class="cap-bar-track"><div class="cap-bar-fill" id="insight-cap-fill" style="width:0%"></div></div>
        <span class="cap-bar-label" id="insight-cap-label">—</span>
      </div>
    </div>
    <div class="insight-card" id="insight-comparison">
      <span class="comp-header" id="insight-comp-header">COMPARED TO PREVIOUS —</span>
      <div id="insight-comp-verdict" class="comp-verdict">—</div>
      <div id="insight-comp-deltas" class="comp-deltas"></div>
    </div>
    <div class="insight-card" id="insight-trend">
      <span class="insight-card-label">CROWD IN NEXT HOUR</span>
      <div id="insight-trend-val" class="trend-main"></div>
      <span id="insight-trend-sub" class="trend-sub"></span>
    </div>
  </div>

  <!-- PREDICTION CHART: full-width -->
  <div class="section-pred" id="section-predict">
    <div class="pred-header-row">
      <div class="section-title">Predicted Occupancy</div>
      <div class="pred-nav">
        <button class="pred-nav-btn" id="pred-prev">&#8592;</button>
        <span class="pred-date-label" id="pred-date-label" style="cursor:pointer">—</span>
        <button class="pred-nav-btn" id="pred-next">&#8594;</button>
      </div>
    </div>
    <div id="cal-popup" class="cal-popup" style="display:none"></div>

    <div class="chart-card">
      <canvas id="pred-chart" height="290"></canvas>
    </div>

  </div>

  <!-- WEEKLY PATTERNS: full-width -->
  <div class="section-weekly" id="section-weekly">
    <div class="weekly-header-row">
      <div class="section-title">Weekly Patterns</div>
      <div class="weekly-controls-inline">
        <div class="field">
          <select id="day-select">
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
          </select>
        </div>
        <div class="field">
          <select id="range-select">
            <option>Last 7 days</option><option>Last month</option>
            <option>Last 6 months</option><option>Last year</option><option>All time</option>
          </select>
        </div>
        <div class="check-row">
          <input type="checkbox" id="semester-check" checked>
          <label for="semester-check">Semester only</label>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <canvas id="weekly-chart" height="290"></canvas>
      <div id="weekly-no-data" class="no-data-overlay"></div>
    </div>
    <div class="chart-caption" id="weekly-meta"></div>
  </div>

</main>

<footer>
  <div class="footer-r" id="footer-built"></div>
</footer>

<script>
const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

// ── Supabase config ────────────────────────────────────────────
const SB_URL      = 'https://njhxcwcvyorwqlfacnal.supabase.co';
const SB_ANON_KEY = 'sb_publishable_in5UWgu0ZCkriOULxBZ8GA_kKJ0qUvA';

async function sbFetch(path) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SB_ANON_KEY, 'Authorization': `Bearer ${SB_ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}: ${path}`);
  return res.json();
}

// Supabase returns TIMESTAMPTZ as UTC (+00:00). Convert UTC → PT using manual
// DST arithmetic instead of toLocaleString (~100µs/call × 7200 rows = 720ms).
const _ptBounds = {};
function _getPTBounds(year) {
  if (_ptBounds[year]) return _ptBounds[year];
  const mar1       = Date.UTC(year, 2, 1);
  const mar1dow    = new Date(mar1).getUTCDay();
  const firstSunMar = mar1 + (mar1dow === 0 ? 0 : (7 - mar1dow)) * 86400000;
  const dstStart   = firstSunMar + 7 * 86400000 + 10 * 3600000; // 2nd Sun Mar 10:00 UTC
  const nov1       = Date.UTC(year, 10, 1);
  const nov1dow    = new Date(nov1).getUTCDay();
  const firstSunNov = nov1 + (nov1dow === 0 ? 0 : (7 - nov1dow)) * 86400000;
  const dstEnd     = firstSunNov + 9 * 3600000;                  // 1st Sun Nov 09:00 UTC
  return (_ptBounds[year] = { dstStart, dstEnd });
}
function slotTsToKey(slotTs) {
  const ms = Date.parse(slotTs);
  const { dstStart, dstEnd } = _getPTBounds(new Date(ms).getUTCFullYear());
  const ptMs = ms + ((ms >= dstStart && ms < dstEnd) ? -7 : -8) * 3600000;
  const d = new Date(ptMs);
  return (
    d.getUTCFullYear() + '-' +
    String(d.getUTCMonth() + 1).padStart(2, '0') + '-' +
    String(d.getUTCDate()).padStart(2, '0') + '_' +
    String(d.getUTCHours()).padStart(2, '0') + ':' +
    String(d.getUTCMinutes()).padStart(2, '0')
  );
}

function slotToLabel(h) {

  const min    = Math.round((h - hour) * 60);
  const period = hour >= 12 ? 'PM' : 'AM';
  const dh     = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
  return min === 0 ? `${dh}:00 ${period}` : `${dh}:${String(min).padStart(2,'0')} ${period}`;
}

function buildTodayActuals(rows, today) {

  rows.forEach(row => {
    const d  = new Date(row.timestamp);
    const pt = new Date(d.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
    const ds = `${pt.getFullYear()}-${String(pt.getMonth()+1).padStart(2,'0')}-${String(pt.getDate()).padStart(2,'0')}`;
    if (ds !== today) return;
    const total   = pt.getHours() * 60 + pt.getMinutes();
    const rounded = Math.round(total / 15) * 15;
    const h = Math.floor(rounded / 60), m = rounded % 60;

    bins[key].sum += row.percent_full;
    bins[key].n   += 1;

    .map(b => ({ x: b.h + b.m/60, y: Math.round(b.sum/b.n*10)/10, label: formatTime(b.h, b.m) }));

  if (h === 12) return '12 PM';

  const today = todayPT();
  if (dateStr === today) {

function buildPredPoints(data, dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const { open, close } = getOpenHours(d.getDay());
  const points = [];
  for (let h = open; h < close; h++) {
    for (const m of [0, 15, 30, 45]) {
      const key = `${dateStr}_${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const pred = data.predictions[key];
      if (!pred) continue;
      points.push({ x: h + m / 60, y: Math.round((pred[0] + pred[1]) / 2 * 10) / 10, label: formatTime(h, m) });
    }
  }
  // closing zero
  points.push({ x: close, y: 0, label: formatTime(close, 0) });
  return points;
}

// Custom plugin: draws a vertical "Now" line
const nowLinePlugin = {
  id: 'nowLine',
  afterDatasetsDraw(chart) {
    const opts = chart.options.plugins.nowLine;
    if (!opts?.show || opts.value == null) return;
    const { ctx, chartArea, scales } = chart;
    const x = scales.x.getPixelForValue(opts.value);
    if (x < chartArea.left || x > chartArea.right) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(147, 164, 245, 0.55)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(x, chartArea.top);

    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(147, 164, 245, 0.65)';
    ctx.font = `500 10px 'Inter', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Now', x, chartArea.top - 6);

};

// Inline plugin (pred chart only): intercepts Chart.js event pipeline to show
// the native tooltip when hovering near the Now line.
const nowHoverPlugin = {
  id: 'nowHover',
  afterEvent(chart, args) {
    const { event } = args;
    if (event.type !== 'mousemove' && event.type !== 'mouseout') return;
    const opts = chart.options.plugins.nowLine;
    if (!opts?.show || opts.value == null) { nowHoverState.active = false; return; }
    const nowX = chart.scales.x.getPixelForValue(opts.value);

    if (event.type === 'mousemove' && Math.abs(event.x - nowX) <= 10) {
      // If a real data point is at least as close to the cursor as the Now line,
      // let Chart.js show its normal tooltip instead.
      const nearest = chart.getElementsAtEventForMode(
        event.native, 'nearest', { intersect: false }, false
      );
      if (nearest.length > 0) {
        const ptX = chart.getDatasetMeta(nearest[0].datasetIndex).data[nearest[0].index].x;
        if (Math.abs(event.x - ptX) <= Math.abs(event.x - nowX)) {
          nowHoverState.active = false;
          return;
        }
      }

      const actualData = chart.data.datasets[0].data;
      if (!actualData.length) { nowHoverState.active = false; return; }

      // Nearest actual point to "now" for tooltip anchoring
      let closestIdx = 0, minDist = Infinity;
      actualData.forEach((p, i) => {
        const d = Math.abs(p.x - opts.value);
        if (d < minDist) { minDist = d; closestIdx = i; }
      });

      const pt = getPTNow();
      nowHoverState.active = true;
      nowHoverState.title  = formatTime(pt.getHours(), pt.getMinutes());
      nowHoverState.label  = liveCapacity
        ? ` Actual: ${liveCapacity.pct.toFixed(1)}%`
        : ' Live data unavailable';

      chart.tooltip.setActiveElements(
        [{ datasetIndex: 0, index: closestIdx }],
        { x: event.x, y: event.y }
      );
      args.changed = true;
    } else {
      if (nowHoverState.active) {
        nowHoverState.active = false;
        args.changed = true;
      }
    }
  }
};

function getBlendedSlots(data, fromH, toH, date) {
  const dateStr = date || todayPT();
  const isToday = dateStr === todayPT();
  const simMap = {};
  if (isToday && data.today_similarity_preds) {
    data.today_similarity_preds.forEach(p => { simMap[p.x] = p.y; });
  }
  const w = isToday ? (data.today_blend_weight || 0) : 0;
  const slots = [];
  for (let h = Math.floor(fromH); h <= Math.floor(toH); h++) {
    for (const m of [0, 15, 30, 45]) {
      const slotH = h + m / 60;
      if (slotH < fromH || slotH >= toH) continue;
      const key  = `${dateStr}_${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const pred = data.predictions[key];
      if (!pred) continue;
      const mlAvg   = (pred[0] + pred[1]) / 2;
      const simY    = simMap[slotH];
      const blended = simY != null ? (1 - w) * mlAvg + w * simY : mlAvg;
      slots.push({ h, m, slotH, y: blended });
    }
  }
  return slots;
}

function computeTrend(data, livePct) {
  const isToday = predDate === todayPT();
  const d = new Date(predDate + 'T12:00:00');
  const { open, close } = getOpenHours(d.getDay());

  let fromH, toH, sub;
  if (isToday) {
    const pt  = getPTNow();
    const nowH = pt.getHours() + pt.getMinutes() / 60;
    if (close - nowH < 1) return null;
    fromH = nowH;
    toH   = Math.min(nowH + 1, close);
    sub   = null;
  } else {
    fromH = open;
    toH   = Math.min(open + 1, close);
    sub   = 'first hour · projected';
  }

  const slots = getBlendedSlots(data, fromH, toH, predDate);
  if (slots.length < 2) return null;

  const startY = (isToday && livePct != null) ? livePct : slots[0].y;
  const endY   = slots[slots.length - 1].y;
  const delta  = endY - startY;

  const dir = Math.abs(delta) < 5 ? 'flat' : delta > 0 ? 'up' : 'down';
  return { dir, delta: Math.round(Math.abs(delta)), startY: Math.round(startY), sub };
}

function computeQuietWindow(data) {
  if (predDate !== todayPT()) return null;
  const pt  = getPTNow();
  const nowH = pt.getHours() + pt.getMinutes() / 60;
  const { open, close } = getOpenHours(pt.getDay());
  const THRESHOLD = 50;

  const slots = getBlendedSlots(data, nowH, close);
  if (!slots.length) return null;

  let bestWindow = null, bestLen = 0, bestAvg = Infinity;
  let runStart = null, runSlots = [];

  function evalRun() {
    if (!runSlots.length) return;
    const avg = runSlots.reduce((s, r) => s + r.y, 0) / runSlots.length;
    if (runSlots.length > bestLen || (runSlots.length === bestLen && avg < bestAvg)) {
      bestLen = runSlots.length;
      bestAvg = avg;
      bestWindow = { startH: runSlots[0].h, startM: runSlots[0].m,
                     endSlotH: runSlots[runSlots.length - 1].slotH + 0.25, avg };
    }
  }

  for (const s of slots) {
    if (s.y <= THRESHOLD) {
      runSlots.push(s);
    } else {
      evalRun();
      runSlots = [];
    }
  }
  evalRun();

  if (!bestWindow) {
    // No sub-threshold window — find quietest single hour instead
    let minAvg = Infinity, minStart = null;
    for (let i = 0; i <= slots.length - 4; i++) {
      const block = slots.slice(i, i + 4);
      const avg = block.reduce((s, r) => s + r.y, 0) / block.length;
      if (avg < minAvg) { minAvg = avg; minStart = block[0]; }
    }
    if (!minStart) return null;
    const endH = minStart.slotH + 1;
    return { startH: minStart.h, startM: minStart.m, endSlotH: endH, avg: Math.round(minAvg), fallback: true };
  }

  return { ...bestWindow, avg: Math.round(bestWindow.avg), fallback: false };
}

function computeDayComparisonAt(dayName, qH, data) {
  function getWeeklyAt(key, h) {
    const arr = data.weekly[key];
    if (!arr) return null;
    const pt = arr.find(p => p.x === h);
    return pt ? pt.y : null;
  }

  return {
    lastWeek:     getWeeklyAt(`${dayName}|Last 7 days|false`, qH),
    thisSemester: getWeeklyAt(`${dayName}|This semester|true`, qH),

}

      }
    } else {
      const nowH = pt.getHours() + pt.getMinutes() / 60;
      const isBeforeOpen = nowH < openH;
      const nextOpen = isBeforeOpen ? openH : getOpenHours((pt.getDay() + 1) % 7).open;
      const prefix   = isBeforeOpen ? 'Opens at' : 'Opens tomorrow at';
      openPill.textContent   = 'CLOSED';
      statusSep.textContent  = '—';
      insightPct.textContent  = `${prefix} ${formatTime(nextOpen, 0)}`;
      insightPct.style.color  = 'var(--sub)';
      insightPct.style.fontSize = '16px';
      capFill.style.width    = '0%';
      capLabel.textContent   = '—';
    }
  } else {
    liveDot.style.display  = 'none';
    openPill.className     = 'open-pill open';
    openPill.textContent   = `${formatTime(openH, 0)} – ${formatTime(closeH, 0)}`;
    openPill.style.color   = 'var(--text)';
    openPill.style.fontSize = '28px';
    openPill.style.borderColor = 'rgba(147,164,245,0.2)';
    openPill.style.background  = 'rgba(147,164,245,0.05)';
    statusSep.textContent  = '';
    insightPct.textContent = '';

    const allSlots = getBlendedSlots(data, openH, closeH, predDate);
    if (allSlots.length) {
      const avg  = allSlots.reduce((s, p) => s + p.y, 0) / allSlots.length;
      const peak = allSlots.reduce((a, b) => b.y > a.y ? b : a);
      const fillCls = avg >= 90 ? 'critical' : avg >= 80 ? 'high' : avg >= 60 ? 'mid' : '';
      capFill.style.width = `${Math.min(avg, 100)}%`;
      capFill.className = `cap-bar-fill${fillCls ? ' ' + fillCls : ''}`;
      capLabel.textContent = `avg ${Math.round(avg)}% · peak ${Math.round(peak.y)}%`;
    } else {
      capFill.style.width  = '0%';
      capLabel.textContent = '—';
    }
  }

  // Card 2: Comparison — use viewed day, noon as representative hour for non-today
  const cmpH  = isToday
    ? Math.round((pt.getHours() + pt.getMinutes() / 60) * 4) / 4
    : 12;
  const cmp = computeDayComparisonAt(dayName, cmpH, data);
  const verdictEl = document.getElementById('insight-comp-verdict');
  const deltasEl  = document.getElementById('insight-comp-deltas');
  const compHeaderEl = document.getElementById('insight-comp-header');
  if (compHeaderEl) compHeaderEl.textContent = `NOW VS PREVIOUS ${dayName.toUpperCase()}S`;
  const refPct = isToday ? livePct : null;

  const pairs = [
    { label: 'last week',    val: cmp.lastWeek },
    { label: 'this sem',     val: cmp.thisSemester },
    { label: 'all time',     val: cmp.allTime },
  ];

  // Use this semester as baseline, fall back to all time
  const baseline = cmp.thisSemester ?? cmp.allTime ?? null;
  const avgDelta = (baseline != null && refPct != null) ? refPct - baseline : null;

  if (verdictEl) {
    if (avgDelta == null) {
      verdictEl.textContent = '—';
      verdictEl.className = 'comp-verdict average';
    } else if (avgDelta > 15) {
      verdictEl.textContent = 'Much busier than usual';
      verdictEl.className = 'comp-verdict much-busier';
    } else if (avgDelta > 6) {
      verdictEl.textContent = 'Busier than usual';
      verdictEl.className = 'comp-verdict busier';
    } else if (avgDelta > 3) {
      verdictEl.textContent = 'A bit busier than usual';
      verdictEl.className = 'comp-verdict bit-busier';
    } else if (avgDelta < -15) {
      verdictEl.textContent = 'Much quieter than usual';
      verdictEl.className = 'comp-verdict much-quieter';
    } else if (avgDelta < -6) {
      verdictEl.textContent = 'Quieter than usual';
      verdictEl.className = 'comp-verdict quieter';
    } else if (avgDelta < -3) {
      verdictEl.textContent = 'A bit quieter than usual';
      verdictEl.className = 'comp-verdict bit-quieter';
    } else {
      verdictEl.textContent = 'About average';
      verdictEl.className = 'comp-verdict average';
    }
  }

  if (deltasEl) {
    deltasEl.innerHTML = pairs.map((p, i) => {
      const diff = (p.val != null && refPct != null) ? Math.round(refPct - p.val) : null;
      const cls  = diff == null ? '' : diff > 15 ? 'much-busier' : diff > 6 ? 'busier' : diff > 3 ? 'bit-busier' : diff < -15 ? 'much-quieter' : diff < -6 ? 'quieter' : diff < -3 ? 'bit-quieter' : '';
      const sign = diff > 0 ? '+' : '';
      const valStr = diff != null ? `${sign}${diff}%` : '—';
      const sep = i < pairs.length - 1 ? `<span class="comp-delta-sep">·</span>` : '';
      return `<span class="comp-delta-item"><span class="${cls}">${valStr}</span> vs ${p.label}</span>${sep}`;
    }).join('');
  }

  // Card 3: Trend
  const trendEl  = document.getElementById('insight-trend-val');
  const trendSub = document.getElementById('insight-trend-sub');
  const trend = computeTrend(data, livePct);
  if (!trend || !isToday) {
    trendEl.innerHTML  = `<span class="quiet-dash">—</span>`;
    trendSub.textContent = '';
  } else {
    const arrows = { up: '↑', down: '↓', flat: '→' };
    const labels = { up: 'Getting busier', down: 'Getting quieter', flat: 'Holding steady' };
    const sign = trend.dir === 'down' ? '-' : '+';
    const deltaStr = `${sign}${trend.delta}%`;
    trendEl.innerHTML =
      `<div class="trend-line">` +
        `<span class="trend-arrow ${trend.dir}">${arrows[trend.dir]}</span>` +
        `<span class="trend-label ${trend.dir}">${labels[trend.dir]}</span>` +
        (deltaStr ? `<span class="trend-delta ${trend.dir}">${deltaStr}</span>` : '') +
      `</div>`;
    const fromPct = (isToday && livePct != null) ? Math.round(livePct) : trend.startY;
    trendSub.textContent = trend.sub || `from ${fromPct}% now`;
  }

}

// ── Boot ───────────────────────────────────────────────────────
async function init() {
  updateStatusBar();

  const today     = todayPT();
  const yesterday = shiftDate(today, -1);

  let predRows, weeklyRows, actualsRows, todaySummaryRows;
  try {
    [predRows, weeklyRows, actualsRows, todaySummaryRows] = await Promise.all([
      sbFetch(`predictions?slot_ts=gte.${today}T00:00:00&order=slot_ts.asc&limit=10000`),
      sbFetch(`weekly_averages?select=*&limit=10000`),
      sbFetch(`capacity_log?timestamp=gte.${yesterday}T12:00:00Z&order=timestamp.asc&limit=2000`),
      sbFetch(`today_summary?date=eq.${today}&select=similarity_preds,blend_weight,computed_at`),
    ]);
  } catch (e) {
    console.error('Supabase load failed:', e);
    showDataWarning(`⚠  Could not load gym data: ${e.message}`);
    return;
  }

  // predictions dict: "2026-04-21_07:00" → [rf_pct, mlp_pct]
  const predictions = {};
  predRows.forEach(r => { predictions[slotTsToKey(r.slot_ts)] = [r.rf_pct, r.mlp_pct]; });

  // weekly dict: "Monday|Last 7 days|false" → [{x, y, label}]
  const weekly = {};
  weeklyRows.forEach(r => {
    const disp = RANGE_DB_TO_DISPLAY[r.range_type] || r.range_type;
    const key  = `${r.day_of_week}|${disp}|${r.semester_only}`;
    if (!weekly[key]) weekly[key] = [];
    weekly[key].push({ x: r.hour_slot, y: r.avg_pct, label: slotToLabel(r.hour_slot) });
  });
  Object.values(weekly).forEach(arr => arr.sort((a, b) => a.x - b.x));
  console.log('weekly rows:', weeklyRows.length, '| keys:', Object.keys(weekly).length, '| sample key:', Object.keys(weekly)[0]);

  const ts = todaySummaryRows[0] || {};
  const built_at = ts.computed_at
    ? new Date(ts.computed_at).toLocaleString('en-US', { timeZone: 'America/Los_Angeles',
        month: 'numeric', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) + ' PT'
    : today;

  const data = {
    predictions,
    weekly,
    today_actuals:           buildTodayActuals(actualsRows, today),
    today_similarity_preds:  ts.similarity_preds || [],
    today_blend_weight:      ts.blend_weight || 0,
    built_at,
  };

  if (Object.keys(predictions).length === 0) {
    showDataWarning('⚠  Prediction data is unavailable — the daily build may not have run yet.');
  }

  const pt = getPTNow();
  predDate = today;
  document.getElementById('day-select').value = DAYS[pt.getDay()];

  window._insightData = data;

  document.getElementById('pred-prev').addEventListener('click', () => {
    predDate = shiftDate(predDate, -1);
    updatePredChart(data);
    renderInsightCards(data);
  });
  document.getElementById('pred-next').addEventListener('click', () => {
    predDate = shiftDate(predDate, 1);
    updatePredChart(data);
    renderInsightCards(data);
  });

  // Calendar popup
  const calPopup = document.getElementById('cal-popup');
  const calLabel = document.getElementById('pred-date-label');
  const minDate  = today;
  const maxDate  = shiftDate(today, 179);
  let calYear, calMonth;

  function renderCalendar() {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const prevMonthHasDays = new Date(calYear, calMonth - 1, 28) >= new Date(minDate + 'T00:00:00');
    const nextMonthHasDays = new Date(calYear, calMonth + 1, 1) <= new Date(maxDate + 'T00:00:00');

    let html = `<div class="cal-header">
      <button class="cal-nav-btn" id="cal-prev-month" ${!prevMonthHasDays ? 'disabled' : ''}>&#8592;</button>
      <span class="cal-month-label">${months[calMonth]} ${calYear}</span>
      <button class="cal-nav-btn" id="cal-next-month" ${!nextMonthHasDays ? 'disabled' : ''}>&#8594;</button>
    </div>
    <div class="cal-grid">`;
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => html += `<div class="cal-dow">${d}</div>`);
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-day cal-day-empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const disabled = ds < minDate || ds > maxDate;
      const selected = ds === predDate;
      const isToday  = ds === today;
      const cls = ['cal-day', disabled ? 'cal-day-disabled' : '', selected ? 'cal-day-selected' : '', isToday ? 'cal-day-today' : ''].filter(Boolean).join(' ');
      html += `<div class="${cls}" data-date="${ds}">${d}</div>`;
    }
    html += '</div>';
    calPopup.innerHTML = html;

    document.getElementById('cal-prev-month').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
    document.getElementById('cal-next-month').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });
    calPopup.querySelectorAll('.cal-day:not(.cal-day-disabled):not(.cal-day-empty)').forEach(el => {
      el.addEventListener('click', () => {
        predDate = el.dataset.date;
        calPopup.style.display = 'none';
        updatePredChart(data);
        renderInsightCards(data);
      });
    });
  }

  calLabel.addEventListener('click', (e) => {
    e.stopPropagation();
    if (calPopup.style.display !== 'none') { calPopup.style.display = 'none'; return; }
    const d = new Date(predDate + 'T12:00:00');
    calYear = d.getFullYear(); calMonth = d.getMonth();
    renderCalendar();
    const navEl = document.querySelector('.pred-nav');
    calPopup.style.top  = (navEl.offsetTop + navEl.offsetHeight + 8) + 'px';
    calPopup.style.left = navEl.offsetLeft + 'px';
    calPopup.style.display = 'block';
  });

  document.addEventListener('click', () => { calPopup.style.display = 'none'; });
  calPopup.addEventListener('click', e => e.stopPropagation());

  document.getElementById('day-select').addEventListener('change', () => updateWeeklyChart(data));
  document.getElementById('range-select').addEventListener('change', () => updateWeeklyChart(data));
  document.getElementById('semester-check').addEventListener('change', () => updateWeeklyChart(data));

  updatePredChart(data);
  updateWeeklyChart(data);
  renderInsightCards(data);

  document.getElementById('footer-built').textContent = `UPDATED ${data.built_at}`;
}

init();

</script>
