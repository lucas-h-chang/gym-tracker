name: Daily Data Build

on:
  schedule:
    - cron: '0 8 * * *'  # midnight PT (PDT = UTC-7, so 8:00 UTC ≈ midnight PT)
  workflow_dispatch:       # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-daily-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build 90-day predictions → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python predictions_builder.py

      # weekly_averages reverted from a live Postgres view back to a nightly-
      # built table on 2026-07-23: the view (003/004) recomputed a ~13s,
      # disk-spilling, full-history aggregation on every request and 57014'd
      # against the anon role's short statement_timeout. See
      # migrations/005_weekly_averages_revert_to_table.sql and
      # handoffs/SPEC_WEEKLY_AVERAGES_REDESIGN.md. day_profiles stays a live
      # view (002) — it's cheap and fine; day_profiles_builder.py remains in
      # legacy/ as the reference the SQL was translated from.
      - name: Build weekly averages → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python weekly_builder.py
