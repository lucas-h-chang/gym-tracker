name: Daily Data Build

on:
  schedule:
    - cron: '0 8 * * *'  # midnight PT (PDT = UTC-7, so 8:00 UTC ≈ midnight PT)
  workflow_dispatch:       # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-daily-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build 90-day predictions → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python predictions_builder.py

      # weekly_averages and day_profiles are now live Postgres views over
      # capacity_log (see migrations/002_day_profiles_view.sql and
      # migrations/003_weekly_averages_view.sql) instead of nightly-built
      # tables, so weekly_builder.py and day_profiles_builder.py no longer
      # run here. Both scripts are kept in legacy/ as the reference the SQL
      # was translated from.
