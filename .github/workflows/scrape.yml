name: Scrape Gym Data

on:
  workflow_dispatch:  # triggered externally by cron-job.org every 15 minutes

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests

      - name: Run the scraper
        run: python scraper.py

      - name: Commit and push
        run: |
          git config user.name "Automated Robot"
          git config user.email "actions@users.noreply.github.com"
          git add gym_history.db
          git commit -m "Saved new gym data" || exit 0
          git push
