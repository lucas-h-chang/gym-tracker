name: Scrape Gym Data

on:
  workflow_dispatch:  # triggered externally by cron-job.org every 15 minutes

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scrape-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install requests supabase scikit-learn torch --extra-index-url https://download.pytorch.org/whl/cpu pandas numpy pytz

      - name: Scrape live count → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DENSITY_TOKEN: ${{ secrets.DENSITY_TOKEN }}
        run: python scraper.py

      - name: Build today similarity preds → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python today_builder.py
