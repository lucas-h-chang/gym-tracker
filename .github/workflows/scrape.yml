name: Scrape Gym Data

on:
  workflow_dispatch:  # triggered externally by cron-job.org every 15 minutes

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scrape-${{ hashFiles('requirements.txt') }}

      - name: Install tools
        run: pip install requests scikit-learn torch --extra-index-url https://download.pytorch.org/whl/cpu pandas numpy pytz

      - name: Run the scraper
        run: python scraper.py

      - name: Install notification dependencies
        run: pip install twilio supabase

      - name: Push to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python push_to_supabase.py

      - name: Run notifier
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python notifier.py

      - name: Build static site
        run: python build_static.py

      - name: Commit and push
        run: |
          git config user.name "Automated Robot"
          git config user.email "actions@users.noreply.github.com"
          git add gym_history.db docs/data.json
          git commit -m "Saved new gym data" || exit 0
          git push
