name: Build Curve Model

on:
  schedule:
    - cron: '0 10 * * 0'  # Sunday ~03:00 PT (10:00 UTC, approximate across DST)
  workflow_dispatch:        # manual "Run" button to rebuild on demand

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Check out this repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build curve table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python build_curves.py

      - name: Sanity-check the built curves
        run: python -m pytest test_curve_sanity.py -v

      - name: Commit and push
        run: |
          git config user.name "Automated Robot"
          git config user.email "actions@users.noreply.github.com"
          git add models/curves.json models/curve_metrics.json
          git commit -m "Rebuilt curve model" || exit 0
          git push

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Weekly curve rebuild FAILED — ${new Date().toISOString().slice(0,10)}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
